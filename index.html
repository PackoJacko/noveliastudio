// FIREBASE REFS

const fbAuth = firebase.auth();
const fbDb   = firebase.firestore();

// ═══════════════════════════════════════════════════════════
// STORAGE — localStorage (cache) + Firestore (cloud)
// ═══════════════════════════════════════════════════════════
const _ls  = (k,v)  => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };
const _lg  = (k,fb) => { try{ const r=localStorage.getItem(k); return r!==null?JSON.parse(r):fb; }catch{ return fb; } };
const _lsb = (bid,k,fb) => _lg(`b:${bid}:${k}`,fb);

// Write queue — batches rapid edits, flushes to Firestore after 1.5s idle
let _onSynced=null;
// Per-key debounce timers so each field has its own 2s debounce
const _fieldTimers={};

// queueWrite — ALWAYS writes to localStorage immediately.
// Firestore write is debounced per field (2s).
// immediate=true bypasses debounce (for button-triggered saves).
const queueWrite=(bid,key,val,immediate=false)=>{
  // 1. localStorage — unconditional, always
  try{ localStorage.setItem(`b:${bid}:${key}`,JSON.stringify(val)); }catch(e){}
  // 2. Firestore — only if logged in
  const uid=fbAuth.currentUser?.uid; if(!uid||!bid) return;
  const tk=`${bid}:${key}`;
  clearTimeout(_fieldTimers[tk]);
  const doWrite=async()=>{
    try{
      await fbDb.collection('users').doc(uid).collection('books').doc(bid)
        .set({[key]:val,_ts:Date.now()},{merge:true});
      if(_onSynced) _onSynced(new Date().toISOString());
    }catch(e){ console.warn(`Firestore write failed (${key}):`,e.message); }
  };
  if(immediate) doWrite();
  else _fieldTimers[tk]=setTimeout(doWrite,2000);
};

// Flush all pending debounced writes immediately (used on beforeunload)
const flushNow=()=>{ Object.keys(_fieldTimers).forEach(k=>clearTimeout(_fieldTimers[k])); };

// Library
const _saveLib=async(lib)=>{
  _ls('library:books',lib);
  const uid=fbAuth.currentUser?.uid; if(!uid) return;
  try{ await fbDb.collection('users').doc(uid).set({library:lib,_ts:Date.now()},{merge:true}); }catch{}
};
const _loadLib=async()=>{
  const uid=fbAuth.currentUser?.uid;
  if(uid){ try{ const d=await fbDb.collection('users').doc(uid).get(); if(d.exists&&d.data().library){ const lib=d.data().library; _ls('library:books',lib); return lib; } }catch{} }
  return _lg('library:books',[]);
};

// API key (stored in Firestore per-user so it syncs across devices)
const _saveApiKey=async(key)=>{
  localStorage.setItem('novelai:apikey',key);
  const uid=fbAuth.currentUser?.uid; if(!uid) return;
  try{ await fbDb.collection('users').doc(uid).set({anthropicKey:key},{merge:true}); }catch{}
};
const _loadApiKey=async()=>{
  const uid=fbAuth.currentUser?.uid;
  if(uid){ try{ const d=await fbDb.collection('users').doc(uid).get(); if(d.exists&&d.data().anthropicKey){ const k=d.data().anthropicKey; localStorage.setItem('novelai:apikey',k); return k; } }catch{} }
  return localStorage.getItem('novelai:apikey')||null;
};

// Book data — cloud first, localStorage fallback
const _loadBookCloud=async(bid)=>{
  const uid=fbAuth.currentUser?.uid; if(!uid) return null;
  try{
    const d=await fbDb.collection('users').doc(uid).collection('books').doc(bid).get();
    if(d.exists){ const data=d.data(); for(const [k,v] of Object.entries(data)) if(!k.startsWith('_')) try{localStorage.setItem(`b:${bid}:${k}`,JSON.stringify(v));}catch{}; return data; }
  }catch{}
  return null;
};

// Migrate localStorage data to Firestore on first login
const _migrateLocal=async(uid)=>{
  const lib=_lg('library:books',[]); if(!lib.length) return;
  try{
    const doc=await fbDb.collection('users').doc(uid).get();
    if(doc.exists&&doc.data()._migrated) return;
    await fbDb.collection('users').doc(uid).set({library:lib,_migrated:true,_ts:Date.now()},{merge:true});
    const FIELDS=['idea','synopsis','outline','beats','prose','step','manuscript','characters','world','structure','escaleta','chapters','codex','lorebook','bsfavs','mapnodes','maplinks'];
    for(const book of lib){
      const d={};
      for(const k of FIELDS){ const v=_lg(`b:${book.id}:${k}`,null); if(v!==null) d[k]=v; }
      if(Object.keys(d).length) await fbDb.collection('users').doc(uid).collection('books').doc(book.id).set({...d,_migrated:true});
    }
    console.log('✓ Datos locales migrados a la nube');
  }catch(e){ console.warn('Migración omitida:',e.message); }
};

// Debounce helper
function debounce(fn, delay) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), delay); };
}

// ═══════════════════════════════════════════════════════════
// GOOGLE DOCS SYNC
// ─ Requiere: Google Docs API + Drive API habilitadas en tu
//   proyecto Google Cloud, y el OAuth Client ID de tu app.
// ─ Cómo obtener el Client ID:
//   console.cloud.google.com → APIs y servicios → Credenciales
//   → OAuth 2.0 → el "Web client" creado por Firebase
//   → copiar el valor "ID de cliente" (termina en .apps.googleusercontent.com)
// ═══════════════════════════════════════════════════════════
const GDOCS_CLIENT_ID = "TU_OAUTH_CLIENT_ID.apps.googleusercontent.com"; // ← pega aquí tu Client ID
const GDOCS_SCOPES = "https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file";

let _gTokenClient = null;
let _gAccessToken = null;
let _gTokenExpiry  = 0;

// Obtiene (o renueva) el access token con los permisos de Docs/Drive
function _ensureGDocsToken() {
  return new Promise((resolve, reject) => {
    // Token válido — no hace falta nuevo popup
    if (_gAccessToken && Date.now() < _gTokenExpiry - 60000) { resolve(_gAccessToken); return; }
    if (!window.google?.accounts?.oauth2) { reject(new Error("Google Identity Services no cargado aún. Espera un momento y vuelve a intentarlo.")); return; }
    if (!_gTokenClient) {
      _gTokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: GDOCS_CLIENT_ID,
        scope: GDOCS_SCOPES,
        callback: () => {},
      });
    }
    _gTokenClient.callback = (resp) => {
      if (resp.error) { reject(new Error("Error al obtener permisos de Google: " + resp.error)); return; }
      _gAccessToken = resp.access_token;
      _gTokenExpiry  = Date.now() + (resp.expires_in || 3600) * 1000;
      resolve(_gAccessToken);
    };
    // prompt:'' usa cuenta ya logueada sin popup si el token es reciente
    _gTokenClient.requestAccessToken({ prompt: _gAccessToken ? "" : "consent" });
  });
}

// Crea un Google Doc nuevo y devuelve su documentId
async function _gDocsCreate(title) {
  const token = await _ensureGDocsToken();
  const res = await fetch("https://docs.googleapis.com/v1/documents", {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ title }),
  });
  if (!res.ok) throw new Error("No se pudo crear el documento: " + res.status);
  const doc = await res.json();
  return doc.documentId;
}

// Sobreescribe el contenido del Doc con el texto dado
async function _gDocsWrite(docId, text) {
  const token = await _ensureGDocsToken();
  // 1. Obtener índice final actual
  const getRes = await fetch(`https://docs.googleapis.com/v1/documents/${docId}`, {
    headers: { "Authorization": "Bearer " + token },
  });
  if (!getRes.ok) throw new Error("No se pudo leer el documento: " + getRes.status);
  const doc = await getRes.json();
  const content = doc.body?.content || [];
  const lastEl = content[content.length - 1];
  const endIndex = lastEl ? (lastEl.endIndex - 1) : 1;
  // 2. Borrar contenido actual e insertar nuevo
  const requests = [];
  if (endIndex > 1) requests.push({ deleteContentRange: { range: { startIndex: 1, endIndex } } });
  if (text) requests.push({ insertText: { location: { index: 1 }, text } });
  if (!requests.length) return;
  const batchRes = await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ requests }),
  });
  if (!batchRes.ok) throw new Error("Error al escribir en el documento: " + batchRes.status);
}

// Lee el texto plano de un Google Doc
async function _gDocsRead(docId) {
  const token = await _ensureGDocsToken();
  const res = await fetch(`https://docs.googleapis.com/v1/documents/${docId}`, {
    headers: { "Authorization": "Bearer " + token },
  });
  if (!res.ok) throw new Error("No se pudo leer el documento: " + res.status);
  const doc = await res.json();
  let text = "";
  for (const el of (doc.body?.content || [])) {
    if (el.paragraph) {
      for (const pe of (el.paragraph.elements || [])) {
        if (pe.textRun?.content) text += pe.textRun.content;
      }
    }
  }
  return text.trimEnd();
}

// Guarda/actualiza linkedDocId en Firestore y localStorage para un libro
async function _saveLinkedDocId(uid, bid, docId) {
  try {
    await fbDb.collection("users").doc(uid).collection("books").doc(bid)
      .set({ linkedDocId: docId }, { merge: true });
  } catch {}
  try { localStorage.setItem(`b:${bid}:linkedDocId`, docId); } catch {}
}

function useMobile() {
  const [mob, setMob] = useState(()=>window.innerWidth<768);
  useEffect(()=>{
    const h=()=>setMob(window.innerWidth<768);
    window.addEventListener('resize',h); return ()=>window.removeEventListener('resize',h);
  },[]);
  return mob;
}

// API

async function callAI(messages,system="",max=1000,apiKey){
  if(!apiKey) throw new Error("Sin API key. Ve a ⚙ Ajustes.");
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,...(system?{system}:{}),messages}),
  });
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content?.map(b=>b.text||"").join("\n")||"";
}

// SAVE INDICATOR COMPONENT
// ═══════════════════════════════════════════════════════════
function SaveIndicator({ savedAt, isMobile }) {
  const [show, setShow] = useState(false);
  const prev = useRef(null);

  useEffect(()=>{
    if(savedAt && savedAt !== prev.current) {
      prev.current = savedAt;
      setShow(true);
      const t = setTimeout(()=>setShow(false), 3000);
      return ()=>clearTimeout(t);
    }
  },[savedAt]);

  if(!savedAt) return null;

  const timeStr = (() => {
    const d = new Date(savedAt);
    return d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  })();

  return (
    <div style={{
      position:'fixed', bottom: isMobile ? 72 : 16, right: 16,
      background: show ? C.green : 'rgba(16,185,129,0.12)',
      border: `1px solid ${show ? C.green : 'rgba(16,185,129,0.25)'}`,
      color: show ? '#fff' : C.green,
      borderRadius: 999, padding:'6px 14px',
      fontSize:11, fontFamily:'Georgia,serif', fontWeight:600,
      display:'flex', alignItems:'center', gap:6,
      transition:'all .4s ease', zIndex:500,
      boxShadow: show ? '0 4px 12px rgba(16,185,129,0.35)' : 'none',
      animation: show ? 'savePop .3s ease' : 'none',
    }}>
      <span>{show ? '💾' : '✓'}</span>
      <span>{show ? 'Guardado' : timeStr}</span>
    </div>
  );
}

function SyncBadge({status,savedAt,isMobile}){
  const [flash,setFlash]=useState(false); const prev=useRef(null);
  useEffect(()=>{ if(savedAt&&savedAt!==prev.current){ prev.current=savedAt; setFlash(true); const t=setTimeout(()=>setFlash(false),2500); return()=>clearTimeout(t); } },[savedAt]);
  const cfg={synced:{icon:'☁',label:'Guardado en nube',c:C.green},syncing:{icon:'⟳',label:'Guardando...',c:C.yellow},offline:{icon:'◌',label:'Sin conexión',c:C.light}}[status]||{icon:'◌',label:'',c:C.light};
  return(<div style={{position:'fixed',bottom:isMobile?70:14,right:14,background:flash?cfg.c:'rgba(255,255,255,.9)',border:`1px solid ${flash?cfg.c:'rgba(0,0,0,.1)'}`,color:flash?'#fff':cfg.c,borderRadius:999,padding:'5px 12px',fontSize:11,fontFamily:'Georgia,serif',fontWeight:600,display:'flex',alignItems:'center',gap:5,transition:'all .4s ease',zIndex:500,backdropFilter:'blur(8px)'}}>

function LibraryPanel({library,onOpen,onDelete,onClose}){
  const isMobile=useMobile();
  const [confirmDel,setConfirmDel]=useState(null);
  const sorted=[...library].sort((a,b)=>new Date(b.lastEdited||0)-new Date(a.lastEdited||0));
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(12,10,20,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(8px)",padding:isMobile?0:24}} className="modal-wrap">
      <div style={{background:"#1a1528",border:"1px solid rgba(124,58,237,0.25)",borderRadius:isMobile?"20px 20px 0 0":24,width:"100%",maxWidth:820,maxHeight:isMobile?"90vh":"88vh",overflow:"auto",boxShadow:"0 24px 80px rgba(0,0,0,0.8)",marginTop:"auto"}} className="modal-box">
        <div style={{padding:"24px 24px 16px",borderBottom:"1px solid rgba(124,58,237,0.15)",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,background:"#1a1528",zIndex:1}}>
          <div>
            <h2 style={{margin:0,fontSize:22,fontFamily:"Georgia,serif",color:"#fdf6e3",fontWeight:400}}>Biblioteca</h2>
            <p style={{margin:"4px 0 0",fontSize:12,color:"rgba(200,180,255,0.5)",fontFamily:"Georgia,serif"}}>{library.length} obra{library.length!==1?"s":""}</p>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"rgba(200,180,255,0.5)",cursor:"pointer",fontSize:22,padding:8}}>✕</button>
        </div>

// MAIN APP
// ═══════════════════════════════════════════════════════════
function App(){
  const isMobile=useMobile();

  // ── Auth state ──
  const [user,setUser]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [apiKey,setApiKey]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [screen,setScreen]=useState("loading");
  const [library,setLibrary]=useState([]);
  const [activeBook,setActiveBook]=useState(null);
  const [showLibrary,setShowLibrary]=useState(false);
  const [newBookType,setNewBookType]=useState(null);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  // ── Sync state ──
  const [savedAt,setSavedAt]=useState(null);
  const [syncStatus,setSyncStatus]=useState("synced");
  const [linkedDocId,setLinkedDocId]=useState(null);   // Google Doc vinculado al libro activo
  const [docSyncStatus,setDocSyncStatus]=useState("idle"); // idle | syncing | synced | error

  const [view,setView]=useState("engine");
  const [busy,setBusy]=useState(false);
  const [aiField,setAiField]=useState(null);
  const [toast,setToast]=useState(null);
  const [modal,setModal]=useState(null);

  const [idea,setIdea]=useState(""); const [synopsis,setSynopsis]=useState("");
  const [outline,setOutline]=useState(""); const [beats,setBeats]=useState("");
  const [prose,setProse]=useState(""); const [step,setStep]=useState(0);
  const [manuscript,setManuscript]=useState("");
  const [msMode,setMsMode]=useState("full");        // "full" | "chapter"
  const [msChapterIdx,setMsChapterIdx]=useState(0); // índice del capítulo activo
  const [writingChapter,setWritingChapter]=useState(false); // AI escribiendo
  const [selText,setSelText]=useState(""); const [selRange,setSelRange]=useState([0,0]);
  const [showTools,setShowTools]=useState(false);
  const taRef=useRef(null);

  const [characters,setCharacters]=useState([]); const [charForm,setCharForm]=useState(null);
  const [worldData,setWorldData]=useState(EW); const [structure,setStructure]=useState(ES);
  const [escaleta,setEscaleta]=useState([]); const [escaletaForm,setEscaletaForm]=useState(null);
  const [chapters,setChapters]=useState([]);
  const [codex,setCodex]=useState([]); const [codexForm,setCodexForm]=useState(null);
  const [lorebook,setLorebook]=useState([]); const [lbForm,setLbForm]=useState(null);
  const [bsCat,setBsCat]=useState("nombres de personajes"); const [bsCtx,setBsCtx]=useState("");
  const [bsResults,setBsResults]=useState([]); const [bsFavs,setBsFavs]=useState([]);
  const [mapNodes,setMapNodes]=useState([]); const [mapLinks,setMapLinks]=useState([]);
  const [mapFilter,setMapFilter]=useState("all");
  const [addNodeForm,setAddNodeForm]=useState(null); const [addLinkForm,setAddLinkForm]=useState(null);
  const [arcos,setArcos]=useState([]); const [arcosForm,setArcosForm]=useState(null);
  const svgRef=useRef(null);
  const [impStep,setImpStep]=useState(0); const [impText,setImpText]=useState("");
  const [impFiles,setImpFiles]=useState([]); const [impExtracted,setImpExtracted]=useState(null);
  const [impSel,setImpSel]=useState({}); const [impBusy,setImpBusy]=useState(false);
  const [impError,setImpError]=useState(null);
  const [pubFormat,setPubFormat]=useState(null); const [pubSource,setPubSource]=useState("manuscript");
  const [pubResult,setPubResult]=useState(""); const [pubBusy,setPubBusy]=useState(false);
  const [pubCopied,setPubCopied]=useState(false);
  const [pubOpts,setPubOpts]=useState({tone:"",audience:"",selOpt:"",chapterSel:0});

  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(null),4500);};
  const AI=useCallback((msgs,sys,max)=>callAI(msgs,sys,max,apiKey),[apiKey]);

  // ── Wire sync callback ──
  useEffect(()=>{ _onSynced=(ts)=>{setSavedAt(ts);setSyncStatus("synced");}; return()=>{_onSynced=null;}; },[]);

  // ── Save (cloud + local) ──
  const save=useCallback((k,v,immediate=false)=>{
    if(!activeBook?.id) return;
    setSyncStatus("syncing");
    queueWrite(activeBook.id,k,v,immediate);
  },[activeBook?.id]);

  // ── Debounced manuscript save ──
  const debouncedSaveMs=useCallback(
    debounce((bid,text)=>{ setSyncStatus("syncing"); queueWrite(bid,"manuscript",text); },800),
    []
  );
  // ── Firebase auth listener ──
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(async(fbUser)=>{
      setUser(fbUser); setAuthReady(true);
      if(fbUser){
        await _migrateLocal(fbUser.uid);
        const key=await _loadApiKey(); setApiKey(key);
        const lib=await _loadLib(); setLibrary(lib);
        setScreen(key?"home":"setup");
      } else {
        setApiKey(null); setLibrary([]);
        setScreen("login");
      }
    });
    return unsub;
  },[]);

  // ── Network status ──
  useEffect(()=>{
    const on=()=>setSyncStatus("synced"); const off=()=>setSyncStatus("offline");
    window.addEventListener("online",on); window.addEventListener("offline",off);
    return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);

  // ── Flush on page unload ──
  useEffect(()=>{ const h=()=>flushNow(); window.addEventListener("beforeunload",h); return()=>window.removeEventListener("beforeunload",h); },[]);

  // ── Update word count ──
  useEffect(()=>{
    if(activeBook?.id && manuscript!==undefined){
      const wc=manuscript.split(/\s+/).filter(Boolean).length;
      setLibrary(prev=>{
        const next=prev.map(b=>b.id===activeBook.id?{...b,wordCount:wc,lastEdited:new Date().toISOString()}:b);
        _saveLib(next);
        return next;
      });
    }
  },[manuscript,activeBook?.id]);

  // ── Load book (cloud first, localStorage fallback) ──
  const loadBook=useCallback(async(book)=>{
    const id=book.id;
    const cloud=await _loadBookCloud(id);
    const get=(k,fb)=>cloud?.[k]??_lsb(id,k,fb);
    setIdea(get("idea","")); setSynopsis(get("synopsis","")); setOutline(get("outline",""));
    setBeats(get("beats","")); setProse(get("prose","")); setStep(get("step",0));
    setManuscript(get("manuscript",""));
    setCharacters(get("characters",[])); setWorldData(get("world",EW));
    setStructure(get("structure",ES)); setEscaleta(get("escaleta",[]));
    setChapters(get("chapters",[]));
    setCodex(get("codex",[])); setLorebook(get("lorebook",[]));
    setBsFavs(get("bsfavs",[]));
    setMapNodes(get("mapnodes",[])); setMapLinks(get("maplinks",[]));
    setArcos(get("arcos",[]));
    setView("engine"); setShowTools(false); setModal(null); setSidebarOpen(false);
    setSavedAt(null);
    // Google Docs link
    const docId = cloud?.linkedDocId ?? _lsb(book.id,"linkedDocId",null);
    setLinkedDocId(docId||null);
    setDocSyncStatus("idle");
  },[]);

  const openBook=async(book,gotoView)=>{
    setActiveBook(book); await loadBook(book);
    setScreen("app"); setShowLibrary(false);
    if(gotoView) setTimeout(()=>setView(gotoView),50);
  };

  const createBook=async(data)=>{
    const book={id:newBookId(),title:data.title,type:data.type,color:data.color,sagaName:data.sagaName||"",sagaOrder:data.sagaOrder||1,connectedTo:data.connectedTo||[],createdAt:new Date().toISOString(),lastEdited:new Date().toISOString(),wordCount:0};
    const newLib=[book,...library]; setLibrary(newLib); await _saveLib(newLib);
    setNewBookType(null); openBook(book);
  };

  const deleteBook=async(bookId)=>{
    const newLib=library.filter(b=>b.id!==bookId); setLibrary(newLib); await _saveLib(newLib);
    if(activeBook?.id===bookId){setActiveBook(null);setScreen("home");}
  };

  const handleSaveApiKey=async(key)=>{
    await _saveApiKey(key); setApiKey(key);
    setShowSettings(false); if(screen==="setup") setScreen("home");
  };

  // ── Google Docs: vincular / crear Doc ──────────────────────
  const handleLinkGoogleDoc = async () => {
    const uid = fbAuth.currentUser?.uid;
    if (!uid || !activeBook) return;
    if (GDOCS_CLIENT_ID.startsWith("TU_OAUTH")) {
      showToast("⚠ Falta configurar el GDOCS_CLIENT_ID en el código.");
      return;
    }
    setDocSyncStatus("syncing");
    try {
      const docId = await _gDocsCreate(activeBook.title + " — NovelAI Studio");
      // Escribir contenido inicial si hay manuscrito
      if (manuscript.trim()) await _gDocsWrite(docId, manuscript);
      setLinkedDocId(docId);
      await _saveLinkedDocId(uid, activeBook.id, docId);
      setDocSyncStatus("synced");
      showToast("✓ Google Doc creado y vinculado");
      window.open(`https://docs.google.com/document/d/${docId}/edit`, "_blank");
    } catch(e) {
      setDocSyncStatus("error");
      showToast("⚠ " + e.message);
    }
  };

  // ── Google Docs: push (NovelAI → Docs) ────────────────────
  const handlePushToDoc = async () => {
    if (!linkedDocId) return;
    setDocSyncStatus("syncing");
    try {
      await _gDocsWrite(linkedDocId, manuscript);
      setDocSyncStatus("synced");
      showToast("✓ Manuscrito enviado a Google Docs");
    } catch(e) {
      setDocSyncStatus("error");
      showToast("⚠ " + e.message);
    }
  };

  // ── Google Docs: pull (Docs → NovelAI) ────────────────────
  const handlePullFromDoc = async () => {
    if (!linkedDocId) return;
    setDocSyncStatus("syncing");
    try {
      const text = await _gDocsRead(linkedDocId);
      setManuscript(text);
      save("manuscript", text);
      setDocSyncStatus("synced");
      showToast("✓ Manuscrito importado desde Google Docs");
    } catch(e) {
      setDocSyncStatus("error");
      showToast("⚠ " + e.message);
    }
  };

  // ── Google Docs: desvincular ──────────────────────────────
  const handleUnlinkDoc = async () => {
    if (!confirm("¿Desvincular este libro de su Google Doc? El documento no se borrará.")) return;
    const uid = fbAuth.currentUser?.uid;
    setLinkedDocId(null);
    setDocSyncStatus("idle");
    if (uid && activeBook?.id) await _saveLinkedDocId(uid, activeBook.id, null);
  };

INSTRUCCIONES:

NOTAS DEL CAPÍTULO:
${ch.notes||"Sin notas específicas — usa el contexto de la historia"}

CAPÍTULOS ANTERIORES:
${prevChapters||"Este es el primer capítulo"}

PRÓXIMOS CAPÍTULOS (para mantener continuidad):
${nextChapters||"No hay información sobre capítulos siguientes"}

ESCALETA RELEVANTE:
${escaletaForCh||"Sin escenas definidas para este capítulo"}

ARCOS EN JUEGO:
${arcPhases||"Sin arcos definidos"}

${existingText?`BORRADOR ACTUAL (reescribe y mejora):\n${existingText.slice(0,1000)}`:""}

Escribe SOLO el texto del capítulo, sin títulos, sin comentarios, sin explicaciones.`;

    });

    // Drag (with separate start/drag/end so it doesn't fire click after drag)
    const drag=d3.drag()
      .on("start",(event,d)=>{ if(!event.active)sim.alphaTarget(.3).restart(); d.fx=d.x;d.fy=d.y; })
      .on("drag",(event,d)=>{ d.fx=event.x;d.fy=event.y; })
      .on("end",(event,d)=>{ if(!event.active)sim.alphaTarget(0); d.fx=null;d.fy=null; });
    nodeEl.call(drag);

    // Click on empty space to cancel linking
    svg.on("click",()=>{ mapLinkingRef.current=null; nodeEl.selectAll(".ring").attr("stroke","transparent"); });

    sim.on("tick",()=>{
      linkSel.select("line")
        .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
      linkSel.select("text")
        .attr("x",d=>(d.source.x+d.target.x)/2)
        .attr("y",d=>(d.source.y+d.target.y)/2-8);
      nodeEl.attr("transform",d=>"translate("+d.x+","+d.y+")");
    });
    return()=>{ sim.stop(); mapLinkingRef.current=null; };
  },[view,buildAllMapNodes,mapLinks,mapFilter]);

  // ── Import ──
  const readFileAsText=file=>new Promise((res,rej)=>{
    if(file.name.endsWith(".docx")&&window.mammoth){
      const reader=new FileReader();reader.onload=async e=>{try{const r=await window.mammoth.extractRawText({arrayBuffer:e.target.result});res(r.value);}catch(err){rej(err);}};reader.readAsArrayBuffer(file);
    }else{const reader=new FileReader();reader.onload=e=>res(e.target.result);reader.onerror=()=>rej(new Error("Error: "+file.name));reader.readAsText(file,"utf-8");}
  });
  const handleImpFiles=async e=>{
    const files=Array.from(e.target.files);const results=[];
    for(const f of files){try{const text=await readFileAsText(f);results.push({name:f.name,text,ok:true});}catch{results.push({name:f.name,text:"",ok:false});}}
    setImpFiles(results);e.target.value="";
  };
  const processImport=async()=>{
    const combined=(impFiles.filter(f=>f.ok).map(f=>"### "+f.name+"\n"+f.text).join("\n\n")+(impText.trim()?"\n\n"+impText:"")).trim();
    if(!combined){showToast("⚠ Añade archivos o texto.");return;}
    setImpBusy(true);setImpStep(1);setImpError(null);
    const sys="Responde ÚNICAMENTE con JSON (sin markdown, empieza con {).";
    const prompt="Analiza y extrae:\n{\"idea\":\"\",\"synopsis\":\"\",\"characters\":[{\"name\":\"\",\"role\":\"protagonist|antagonist|secondary|mentor|other\",\"appearance\":\"\",\"fears\":\"\",\"secret\":\"\",\"ghost\":\"\",\"arcStart\":\"\",\"arcEnd\":\"\",\"arcHow\":\"\"}],\"codex\":[{\"name\":\"\",\"type\":\"personaje|lugar|objeto|mitología|otro\",\"desc\":\"\"}],\"lorebook\":[{\"keywords\":[\"\"],\"content\":\"\"}],\"worldData\":{\"genre\":\"\",\"magicRules\":\"\",\"geography\":\"\",\"society\":\"\",\"tone\":\"\"},\"structure\":{\"premise\":\"\",\"theme\":\"\",\"incitingIncident\":\"\",\"midpointTwist\":\"\",\"darkNight\":\"\",\"climax\":\"\",\"plotTwists\":\"\"},\"escaleta\":[{\"title\":\"\",\"summary\":\"\",\"goal\":\"\",\"conflict\":\"\",\"hook\":\"\"}],\"manuscript\":\"\"}\n\nCONTENIDO:\n"+combined.substring(0,10000);
    try{
      const raw=await AI([{role:"user",content:prompt}],sys,3000);
      const fb=raw.indexOf("{");const lb=raw.lastIndexOf("}");
      if(fb===-1||lb===-1) throw new Error("JSON no encontrado.");
      const parsed=JSON.parse(raw.slice(fb,lb+1));
      const sel={};
      if(parsed.idea?.trim())sel.idea=true;if(parsed.synopsis?.trim())sel.synopsis=true;
      if(parsed.manuscript?.trim())sel.manuscript=true;if(parsed.characters?.length)sel.characters=true;
      if(parsed.codex?.length)sel.codex=true;if(parsed.lorebook?.length)sel.lorebook=true;
      if(parsed.escaleta?.length)sel.escaleta=true;
      if(Object.values(parsed.worldData||{}).some(v=>v?.trim()))sel.worldData=true;
      if(["premise","theme","incitingIncident","midpointTwist","darkNight","climax","plotTwists"].some(k=>parsed.structure?.[k]?.trim()))sel.structure=true;
      if(!Object.keys(sel).length){setImpError("No se encontró información reconocible.");setImpStep(3);}
      else{setImpExtracted(parsed);setImpSel(sel);setImpStep(2);}
    }catch(e){setImpError("Error: "+e.message);setImpStep(3);}
    setImpBusy(false);
  };
  const applyImport=()=>{
    const d=impExtracted;if(!d)return;
    const nid=()=>Date.now().toString()+Math.random().toString(36).slice(2);
    if(impSel.idea&&d.idea?.trim()){setIdea(d.idea);save("idea",d.idea);}
    if(impSel.synopsis&&d.synopsis?.trim()){setSynopsis(d.synopsis);save("synopsis",d.synopsis);}
    if(impSel.manuscript&&d.manuscript?.trim()){const m=manuscript?(manuscript+"\n\n---\n\n"+d.manuscript):d.manuscript;setManuscript(m);save("manuscript",m);}
    if(impSel.characters&&d.characters?.length){const merged=[...characters,...d.characters.filter(nc=>!characters.some(ec=>ec.name===nc.name)).map(c=>({...c,id:nid()}))];setCharacters(merged);save("characters",merged);}
    if(impSel.codex&&d.codex?.length){const merged=[...codex,...d.codex.filter(nc=>!codex.some(ec=>ec.name===nc.name)).map(c=>({...c,id:nid()}))];setCodex(merged);save("codex",merged);}
    if(impSel.lorebook&&d.lorebook?.length){const merged=[...lorebook,...d.lorebook.map(e=>({...e,id:nid()}))];setLorebook(merged);save("lorebook",merged);}
    if(impSel.worldData&&d.worldData){const merged={...worldData};Object.entries(d.worldData).forEach(([k,v])=>{if(v?.trim())merged[k]=worldData[k]?(worldData[k]+"\n"+v):v;});setWorldData(merged);save("world",merged);}
    if(impSel.structure&&d.structure){const merged={...structure};Object.entries(d.structure).forEach(([k,v])=>{if(v?.trim())merged[k]=structure[k]?(structure[k]+"\n"+v):v;});setStructure(merged);save("structure",merged);}
    if(impSel.escaleta&&d.escaleta?.length){const merged=[...escaleta,...d.escaleta.map(e=>({...e,id:nid()}))];setEscaleta(merged);save("escaleta",merged);}

  // ── Publish ──
  const getSourceText=()=>{if(pubSource==="manuscript")return manuscript;if(pubSource==="synopsis")return synopsis;if(pubSource==="prose")return prose;if(pubSource==="chapter"&&chapters[pubOpts.chapterSel])return chapters[pubOpts.chapterSel].title+"\n\n"+chapters[pubOpts.chapterSel].notes;return manuscript||prose||synopsis||"";};

              {l:"Esquema de Capítulos",v:outline,s:v=>{setOutline(v);save("outline",v);},h:200,show:step>=2},
              {l:"Story Beats",v:beats,s:v=>{setBeats(v);save("beats",v);},h:180,show:step>=3},

            {step<4&&(
              <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginTop:4}}>
                <button onClick={genEngine} disabled={busy||!idea.trim()} style={primBtn(busy||!idea.trim())}>{busy?"⏳ Generando...":"✦ "+btnLbl}</button>

              </div>

        {/* MANUSCRITO */}

          <div style={{maxWidth:860}}>

              {/* Mode toggle */}
              <div style={{display:"flex",gap:5,background:C.bg,borderRadius:999,padding:3,border:`1px solid ${C.border}`}}>

                <button onClick={()=>setMsMode("chapter")} style={{padding:"6px 16px",borderRadius:999,border:"none",background:msMode==="chapter"?C.surface:"transparent",color:msMode==="chapter"?C.accent:C.mid,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif",fontWeight:msMode==="chapter"?600:400,boxShadow:msMode==="chapter"?sh:"none",transition:"all .15s"}}>

                ):(

                    {/* Chapter tabs */}

                      {chapters.map((ch,i)=>{

                          </button>
                        );

                    </div>

                    {/* Active chapter panel */}
                    {chapters[msChapterIdx]&&(()=>{
                      const ch=chapters[msChapterIdx];
                      const sc={done:C.green,wip:C.yellow,draft:C.light};
                      // Extract existing text for this chapter
                      const chMarker=`=== CAPÍTULO ${msChapterIdx+1}:`;
                      const startIdx=manuscript.indexOf(chMarker);
                      const endIdx=startIdx!==-1?manuscript.indexOf("\n===",startIdx+10):-1;
                      const chText=startIdx!==-1?(endIdx!==-1?manuscript.slice(startIdx,endIdx):manuscript.slice(startIdx)):"";

                        <div style={{...card,marginBottom:16,borderLeft:`4px solid ${sc[ch.status]}`}}>

                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                                <span style={{fontSize:12,fontWeight:700,color:C.accent,fontFamily:"Georgia,serif"}}>CAP. {String(msChapterIdx+1).padStart(2,"0")}</span>
                                <span style={{padding:"2px 10px",borderRadius:999,background:sc[ch.status]+"18",border:`1px solid ${sc[ch.status]}33`,color:sc[ch.status],fontSize:10,fontFamily:"Georgia,serif",fontWeight:600}}>
                                  {{done:"✓ Listo",wip:"✏ En progreso",draft:"○ Borrador"}[ch.status]}
                                </span>
                                {chWords>0&&<span style={{fontSize:11,color:C.light,fontFamily:"Georgia,serif"}}>{chWords} palabras</span>}

                            {/* AI Write button */}
                            <button onClick={()=>writeChapterWithAI(msChapterIdx)} disabled={writingChapter||busy}
                              style={{...primBtn(writingChapter||busy),padding:"10px 20px",fontSize:13,flexShrink:0,gap:8,whiteSpace:"nowrap"}}>
                              {writingChapter?(
                                <><span style={{width:14,height:14,border:"2px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block",animation:"spin .8s linear infinite"}}/>Escribiendo...</>
                              ):(
                                <><span>✦</span>{chText?"Reescribir capítulo":"Escribir capítulo"}</>

                            </button>
                          </div>

                            </div>
                            <button onClick={()=>setMsMode("full")} style={{...ghostBtn,padding:"5px 12px",fontSize:12}}>Ver manuscrito completo →</button>
                          </div>
                        </div>
                      );

                    {/* Write all chapters button */}
                    {chapters.length>1&&(

                          <div style={{fontSize:12,color:C.mid,fontFamily:"Georgia,serif"}}>La IA escribirá uno por uno usando todo el contexto. Puede tardar varios minutos.</div>

                          for(let i=0;i<chapters.length;i++){
                            setMsChapterIdx(i);

                          }
                          showToast("✓ Todos los capítulos escritos");
                        }} disabled={writingChapter||busy} style={{...ghostBtn,borderColor:C.accent+"55",color:C.accent,padding:"9px 18px",fontSize:13,fontWeight:600,flexShrink:0}}>
                          ✦ Escribir todos ({chapters.length})
                        </button>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}

            {/* ── AI TOOLS BAR (shown when text selected) ── */}
            {showTools&&(
              <div style={{...card,marginBottom:16,padding:"14px 16px",borderColor:C.aMid+"55",overflowX:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <span style={{fontSize:12,color:C.mid,fontStyle:"italic",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>«{selText.substring(0,40)}{selText.length>40?"…":""}»</span>
                  <button onClick={()=>setShowTools(false)} style={{background:"none",border:"none",color:C.light,cursor:"pointer",fontSize:16,flexShrink:0,padding:4}}>✕</button>
                </div>
                {[
                  {group:"Sensorial",tools:[{id:"describe",label:"🌿 Describir",fn:openDescribe}]},
                  {group:"Estilo",tools:TOOLS_MS.filter(t=>t.group==="estilo").map(t=>({...t,fn:()=>openRewrite(t.id)}))},
                  {group:"Drama",tools:TOOLS_MS.filter(t=>t.group==="drama").map(t=>({...t,fn:()=>openRewrite(t.id)}))},
                  {group:"Narrativa",tools:TOOLS_MS.filter(t=>t.group==="narrative").map(t=>({...t,fn:()=>openRewrite(t.id)}))},
                ].map(({group,tools})=>(
                  <div key={group} style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginBottom:6}}>
                    <span style={{fontSize:9,fontWeight:700,color:C.light,letterSpacing:"0.1em",textTransform:"uppercase",minWidth:50,flexShrink:0,fontFamily:"Georgia,serif"}}>{group}</span>
                    {tools.map(t=><button key={t.id||t.label} onClick={t.fn} style={{...pill(false,true),borderColor:C.accent+"33",color:C.accent,fontSize:11}}>{t.label}</button>)}
                  </div>
                ))}
              </div>
            )}

            {/* ── FULL MANUSCRIPT TEXTAREA ── */}
            <div style={{position:"relative"}}>
              {msMode==="chapter"&&<div style={{fontSize:11,color:C.light,fontFamily:"Georgia,serif",marginBottom:8,fontStyle:"italic"}}>Manuscrito completo · edita directamente o usa el modo por capítulos para que la IA escriba cada uno</div>}

                onChange={e=>{
                  const v=e.target.value; setManuscript(v);
                  debouncedSaveMs(activeBook?.id,v);
                  setSyncStatus("syncing");
                  if(linkedDocId){ setDocSyncStatus("syncing"); debouncedDocSync(linkedDocId,v); }
                }}
                onMouseUp={handleSel} onKeyUp={handleSel}
                placeholder={"Escribe aquí tu novela…\n\nO usa el modo Por Capítulos ↑ para que la IA escriba cada capítulo automáticamente.\n\n☁ Se guarda en la nube automáticamente."}

                style={{width:"100%",minHeight:isMobile?420:540,background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:isMobile?"20px 18px":"36px 48px",color:C.text,fontSize:isMobile?16:18,lineHeight:2.0,resize:"vertical",boxSizing:"border-box",fontFamily:"Georgia,serif",outline:"none",boxShadow:sh,WebkitOverflowScrolling:"touch"}}

            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12,color:C.light,fontFamily:"Georgia,serif",flexWrap:"wrap",gap:4}}>
              <span>{manuscript.split(/\s+/).filter(Boolean).length} palabras · {chapters.length>0?`${chapters.length} capítulos`:""}</span>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{color:{synced:C.green,syncing:C.yellow,offline:C.red}[syncStatus]||C.light,fontWeight:600}}>
                  {{synced:"☁ Firebase",syncing:"↑ Firebase...",offline:"◌ Sin red"}[syncStatus]}
                </span>
                {linkedDocId&&<span style={{color:{idle:C.light,syncing:C.yellow,synced:"#0f9d58",error:C.red}[docSyncStatus],fontWeight:600}}>
                  {{idle:"📄 Doc",syncing:"📄 Docs...",synced:"📄 Docs ✓",error:"📄 Docs ✗"}[docSyncStatus]}
                </span>}
              </div>
            </div>
          </div>
        )}

        {/* BRAINSTORM */}
        {view==="brainstorm"&&(
          <div style={{maxWidth:680}}>

                <button key={cat} onClick={()=>setBsCat(cat)} style={pill(bsCat===cat,true)}>{cat}</button>

            </div>
            {bsResults.length>0&&<div style={{...card,marginBottom:20,padding:0,overflow:"hidden"}}>

                  <button onClick={()=>{const n=bsFavs.includes(r)?bsFavs.filter(x=>x!==r):[...bsFavs,r];setBsFavs(n);save("bsfavs",n);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:17,opacity:bsFavs.includes(r)?1:.2,flexShrink:0}}>⭐</button>
                </div>
              ))}
            </div>}
            {bsFavs.length>0&&<div>
              <div style={{fontSize:11,fontWeight:700,color:C.light,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontFamily:"Georgia,serif"}}>⭐ Favoritos</div>

                {bsFavs.map((r,i)=>(
                  <div key={i} style={{padding:"11px 18px",borderBottom:i<bsFavs.length-1?"1px solid "+C.borderL:"none",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,color:C.mid,fontFamily:"Georgia,serif"}}>{r}</span>
                    <button onClick={()=>{const n=bsFavs.filter(x=>x!==r);setBsFavs(n);save("bsfavs",n);}} style={{background:"none",border:"none",color:C.light,cursor:"pointer",fontSize:14}}>✕</button>
                  </div>
                ))}
              </div>
            </div>}
          </div>
        )}

        {/* MAPA */}
        {view==="mapa"&&(
          <div style={{display:"flex",flexDirection:"column",height:"100vh"}}>
            <div style={{padding:isMobile?"62px 12px 8px":"12px 20px",background:C.surface,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
              <span style={{fontSize:15,fontFamily:"Georgia,serif",color:C.text,fontWeight:400,marginRight:4}}>Mapa</span>
              <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap"}}>
                {[["all","Todos"],["cast","Personajes"],["world","Mundo"],["plot","Trama"]].map(([f,l])=>(
                  <button key={f} onClick={()=>setMapFilter(f)} style={pill(mapFilter===f,true)}>{l}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:5}}>
                <button onClick={()=>setAddNodeForm({label:"",type:"custom"})} style={{...ghostBtn,fontSize:11,padding:"6px 12px"}} title="Añadir nodo personalizado">＋ Nodo</button>
                <button onClick={()=>window.__mapZoom&&window.__mapZoom()} style={{...ghostBtn,fontSize:11,padding:"6px 12px"}} title="Centrar vista">⊙</button>
              </div>
            </div>
            {/* Instructions bar */}
            <div style={{padding:"5px 20px",background:"rgba(124,58,237,0.05)",borderBottom:`1px solid ${C.borderL}`,fontSize:11,color:C.light,fontFamily:"Georgia,serif",display:"flex",gap:20,flexWrap:"wrap"}}>
              <span>🖱 <strong style={{color:C.mid}}>Clic</strong> en un nodo para conectar con otro</span>
              <span>↔ <strong style={{color:C.mid}}>2º clic</strong> en otro nodo para crear la conexión</span>
              <span>⇄ <strong style={{color:C.mid}}>Arrastrar</strong> para mover · <strong style={{color:C.mid}}>Doble clic</strong> para eliminar</span>
            </div>
            <div style={{flex:1,position:"relative",background:C.bg,overflow:"hidden"}}>
              <svg ref={svgRef} style={{width:"100%",height:"100%"}}/>
              {allMapNodes.length===0&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",color:C.light,fontFamily:"Georgia,serif",pointerEvents:"none",padding:20,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⬡</div><div style={{marginBottom:6}}>El mapa está vacío.</div><div style={{fontSize:13}}>Añade personajes, codex o escaleta y aparecerán aquí automáticamente.</div></div>}
            </div>
            {/* Connections list */}
            {mapLinks.length>0&&<div style={{background:C.surface,borderTop:`1px solid ${C.border}`,padding:"8px 20px",maxHeight:90,overflowY:"auto",flexShrink:0}}>

              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {mapLinks.map(l=>{
                  const sn=allMapNodes.find(n=>n.id===l.source)||{label:l.source};

                  return <div key={l.id} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 10px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:999,fontSize:11,fontFamily:"Georgia,serif",color:C.mid}}>
                    <span style={{color:C.text,fontWeight:500}}>{sn.label}</span>
                    {l.label&&<span style={{color:C.accent,fontSize:10}}>— {l.label} —</span>}
                    {!l.label&&<span style={{color:C.light}}>→</span>}
                    <span style={{color:C.text,fontWeight:500}}>{tn.label}</span>
                    <button onClick={()=>{const n=mapLinks.filter(x=>x.id!==l.id);setMapLinks(n);save("maplinks",n,true);}} style={{background:"none",border:"none",color:C.light,cursor:"pointer",fontSize:12,padding:"0 2px",lineHeight:1}}>✕</button>
