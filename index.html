            {arcos.length===0&&<div style={{...card,textAlign:"center",padding:56,color:C.light,fontFamily:"Georgia,serif"}}>
              <div style={{fontSize:36,marginBottom:12}}>◐</div>
              <div style={{fontSize:15,marginBottom:6}}>Sin arcos argumentales.</div>
              <div style={{fontSize:13}}>Crea el arco principal de tu novela, los secundarios de tus personajes, o las subtramas.</div>
            </div>}

            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              {arcos.map(arc=>{
                const arcColor={principal:C.accent,secundario:C.blue,personaje:C.green,subtrama:"#f59e0b",romance:"#ec4899"}[arc.type]||C.accent;
                const typeLabel={principal:"Principal",secundario:"Secundario",personaje:"Personaje",subtrama:"Subtrama",romance:"Romance"}[arc.type]||arc.type;
                return(
                  <div key={arc.id} style={{...card,borderLeft:`4px solid ${arcColor}`,padding:"20px 24px"}}>
                    {/* Header */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,gap:12,flexWrap:"wrap"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                          <span style={{padding:"3px 12px",borderRadius:999,background:arcColor+"18",border:`1px solid ${arcColor}33`,color:arcColor,fontSize:11,fontFamily:"Georgia,serif",fontWeight:600}}>{typeLabel}</span>
                          {arc.characters?.length>0&&<span style={{fontSize:11,color:C.mid,fontFamily:"Georgia,serif"}}>{arc.characters.join(", ")}</span>}
                        </div>
                        <h3 style={{margin:0,fontSize:18,fontFamily:"Georgia,serif",color:C.text,fontWeight:400}}>{arc.title||"Sin título"}</h3>
                      </div>
                      <div style={{display:"flex",gap:6}}>
                        <button onClick={()=>setArcosForm({...arc})} style={{...ghostBtn,padding:"6px 12px",fontSize:12}}>✏ Editar</button>
                        <button onClick={()=>delArco(arc.id)} style={{...ghostBtn,padding:"6px 12px",fontSize:12,color:C.red}}>✕</button>
                      </div>
                    </div>

                    {/* Phase timeline */}
                    <div style={{position:"relative",marginBottom:arc.notes?16:0}}>
                      {/* Connector line */}
                      <div style={{position:"absolute",top:20,left:20,right:20,height:2,background:`linear-gradient(90deg,${arcColor}44,${arcColor},${arcColor}44)`,zIndex:0}}/>
                      <div style={{display:"grid",gridTemplateColumns:`repeat(${arc.phases?.length||5},1fr)`,gap:8,position:"relative",zIndex:1}}>
                        {(arc.phases||[]).map((ph,i)=>(
                          <div key={ph.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                            <div style={{width:40,height:40,borderRadius:"50%",background:ph.desc?arcColor:C.bg,border:`2px solid ${ph.desc?arcColor:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:ph.desc?"#fff":C.light,transition:"all .2s",flexShrink:0,boxShadow:ph.desc?`0 0 0 4px ${arcColor}22`:"none"}}>{i+1}</div>
                            <div style={{textAlign:"center"}}>
                              <div style={{fontSize:11,fontWeight:600,color:ph.desc?arcColor:C.light,fontFamily:"Georgia,serif",marginBottom:3}}>{ph.label}</div>
                              {ph.desc?<div style={{fontSize:11,color:C.mid,fontFamily:"Georgia,serif",lineHeight:1.4,textAlign:"center"}}>{ph.desc.length>60?ph.desc.slice(0,59)+"…":ph.desc}</div>:<div style={{fontSize:10,color:C.light,fontStyle:"italic",fontFamily:"Georgia,serif"}}>Sin definir</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>

                    {arc.notes&&<div style={{padding:"10px 14px",background:C.bg,borderRadius:10,fontSize:13,color:C.mid,fontFamily:"Georgia,serif",lineHeight:1.6,borderLeft:`2px solid ${arcColor}55`}}>{arc.notes}</div>}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* PLANNING */}
        {view==="planning"&&(
          <div style={{maxWidth:720}}>
            <SecHdr title="Tablero de Capítulos" sub="Planifica el arco de tu novela." action={<button onClick={addCh} style={{...primBtn(false),padding:"9px 18px",fontSize:13}}>+ Capítulo</button>}/>
            {chapters.length===0&&<div style={{...card,textAlign:"center",padding:48,color:C.light,fontFamily:"Georgia,serif"}}>Crea tu primer capítulo.</div>}
            {chapters.map((ch,idx)=>{
              const sc={done:C.green,wip:C.yellow,draft:C.light};
              return(<div key={ch.id} style={{...card,marginBottom:10,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{color:C.accent,fontSize:11,fontWeight:700,minWidth:22,fontFamily:"Georgia,serif"}}>{String(idx+1).padStart(2,"0")}</span>
                  <input value={ch.title} onChange={e=>updCh(ch.id,{title:e.target.value})} style={{flex:1,background:"transparent",border:"none",borderBottom:`1px solid ${C.borderL}`,color:C.text,fontSize:14,padding:"3px 0",outline:"none",fontFamily:"Georgia,serif"}}/>
                  <select value={ch.status} onChange={e=>updCh(ch.id,{status:e.target.value})} style={{background:sc[ch.status]+"18",border:`1px solid ${sc[ch.status]}33`,borderRadius:999,color:sc[ch.status],padding:"4px 10px",fontFamily:"Georgia,serif",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                    <option value="draft">○ Borrador</option><option value="wip">✏ En progreso</option><option value="done">✓ Listo</option>
                  </select>
                  <button onClick={()=>delCh(ch.id)} style={{background:"none",border:"none",cursor:"pointer",color:C.light,fontSize:14,padding:4}}>✕</button>
                </div>
                <textarea value={ch.notes||""} onChange={e=>updCh(ch.id,{notes:e.target.value})} placeholder="¿Qué ocurre? ¿Cuál es el giro?" style={{...fIn,minHeight:60,resize:"vertical",fontSize:13,color:C.mid}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>);
            })}
          </div>
        )}

        {/* ESCALETA */}
        {view==="escaleta"&&(
          <div style={{maxWidth:720}}>
            <SecHdr title="La Escaleta" sub="Define cada escena antes de escribirla." action={<button onClick={()=>setEscaletaForm({...EE})} style={{...primBtn(false),padding:"9px 18px",fontSize:13}}>+ Escena</button>}/>
            {escaleta.length===0&&<div style={{...card,textAlign:"center",padding:48,color:C.light,fontFamily:"Georgia,serif"}}>Sin escenas todavía.</div>}
            {escaleta.map((e,i)=>(
              <div key={e.id} style={{...card,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{width:26,height:26,borderRadius:999,background:C.aLight,color:C.accent,fontSize:12,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</span>
                    <span style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"Georgia,serif"}}>{e.title||"Sin título"}</span>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>setEscaletaForm({...e})} style={{...ghostBtn,padding:"5px 10px",fontSize:12}}>✏</button>
                    <button onClick={()=>delEsc(e.id)} style={{...ghostBtn,padding:"5px 10px",fontSize:12,color:C.red}}>✕</button>
                  </div>
                </div>
                {e.summary&&<p style={{color:C.mid,fontSize:13,lineHeight:1.6,margin:"0 0 8px",fontFamily:"Georgia,serif"}}>{e.summary}</p>}
                <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                  {e.goal&&<span style={{fontSize:11,color:C.green,fontFamily:"Georgia,serif"}}>🎯 {e.goal}</span>}
                  {e.conflict&&<span style={{fontSize:11,color:C.red,fontFamily:"Georgia,serif"}}>⚔ {e.conflict}</span>}
                  {e.hook&&<span style={{fontSize:11,color:C.accent,fontFamily:"Georgia,serif"}}>🎣 {e.hook}</span>}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* STRUCTURE */}
        {view==="structure"&&(
          <div style={{maxWidth:780}}>
            <SecHdr title="Estructura Narrativa" sub="Los pilares que sostienen tu historia."/>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              {[
                {k:"incitingIncident",t:"Incidente Incitador",ph:"La carta llega...",ai:"3 incidentes para:\n"+idea},
                {k:"midpointTwist",t:"Punto de Giro Central",ph:"El twist...",ai:"3 puntos de giro para:\n"+idea},
                {k:"darkNight",t:"Noche Oscura del Alma",ph:"Todo parece perdido...",ai:"Noche oscura:\n"+synopsis.slice(0,300)},
                {k:"climax",t:"Clímax",ph:"El enfrentamiento final...",ai:"Clímax perfecto:\n"+synopsis.slice(0,300)},
              ].map(f=>(
                <div key={f.k} style={card}>
                  <div style={{fontFamily:"Georgia,serif",fontSize:14,color:C.text,marginBottom:10,fontWeight:600}}>{f.t}</div>
                  <textarea value={structure[f.k]||""} onChange={e=>saveStr({...structure,[f.k]:e.target.value})} placeholder={f.ph} style={{...fIn,minHeight:80,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  <AiBtn label="Generar" busy={busy&&aiField===f.k} onClick={()=>aiGen(f.ai,"Experto en estructura."+buildCtx(),v=>saveStr({...structure,[f.k]:v}),f.k)}/>
                </div>
              ))}
            </div>
            <div style={card}>
              <div style={{fontFamily:"Georgia,serif",fontSize:14,marginBottom:8,fontWeight:600}}>Plot Twists</div>
              <textarea value={structure.plotTwists||""} onChange={e=>saveStr({...structure,plotTwists:e.target.value})} placeholder="Lista todos los giros..." style={{...fIn,minHeight:100,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              <AiBtn label="Generar 5 Plot Twists" busy={busy&&aiField==="twists"} onClick={()=>aiGen("5 plot twists para:\n"+idea,"Experto en giros."+buildCtx(),v=>saveStr({...structure,plotTwists:v}),"twists")}/>
            </div>
          </div>
        )}

        {/* CHARACTERS */}
        {view==="characters"&&(
          <div style={{maxWidth:860}}>
            <SecHdr title="El Elenco" sub="Conoce a fondo a tus personajes." action={<button onClick={()=>setCharForm({...EC})} style={{...primBtn(false),padding:"9px 18px",fontSize:13}}>+ Personaje</button>}/>
            {characters.length===0&&<div style={{...card,textAlign:"center",padding:48,color:C.light,fontFamily:"Georgia,serif"}}>El elenco está vacío.</div>}
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
              {characters.map(ch=>(
                <div key={ch.id} style={card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div><div style={{fontSize:16,fontFamily:"Georgia,serif",color:C.text,marginBottom:5}}>{ch.name||"Sin nombre"}</div><Tag color={NODE_C[ch.role]||C.light}>{ROLE_LBL[ch.role]}</Tag></div>
                    <div style={{display:"flex",gap:5}}><button onClick={()=>setCharForm({...ch})} style={{...ghostBtn,padding:"5px 10px",fontSize:12}}>✏</button><button onClick={()=>delChar(ch.id)} style={{...ghostBtn,padding:"5px 10px",fontSize:12,color:C.red}}>✕</button></div>
                  </div>
                  {ch.appearance&&<p style={{color:C.mid,fontSize:13,lineHeight:1.5,marginBottom:10,fontFamily:"Georgia,serif"}}>{ch.appearance}</p>}
                  {ch.fears&&<div style={{fontSize:12,fontFamily:"Georgia,serif",marginBottom:4}}><span style={{color:C.red,fontWeight:500}}>Miedo · </span><span style={{color:C.mid}}>{ch.fears}</span></div>}
                  {ch.secret&&<div style={{fontSize:12,fontFamily:"Georgia,serif",marginBottom:4}}><span style={{color:"#8b5cf6",fontWeight:500}}>Secreto · </span><span style={{color:C.mid}}>{ch.secret}</span></div>}
                  {(ch.arcStart||ch.arcEnd)&&<div style={{marginTop:6,padding:"7px 10px",background:C.aSoft,borderRadius:8,fontSize:12,fontFamily:"Georgia,serif"}}>
                    <span style={{color:C.accent,fontWeight:500}}>Arco · </span><span style={{color:C.mid}}>{ch.arcStart}</span>
                    {ch.arcStart&&ch.arcEnd&&<span style={{color:C.accent}}> → </span>}<span style={{color:C.text,fontWeight:500}}>{ch.arcEnd}</span>
                  </div>}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* WORLD */}
        {view==="world"&&(
          <div style={{maxWidth:780}}>
            <SecHdr title="Construcción del Mundo" sub="Las reglas y atmósfera de tu universo."/>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              {[{k:"genre",l:"Género y Ambientación",ph:"Fantasía oscura...",h:80},{k:"magicRules",l:"Reglas de Magia",ph:"La magia consume...",h:90},{k:"geography",l:"Geografía y Espacios",ph:"Tres reinos...",h:80},{k:"society",l:"Sociedad y Política",ph:"Jerarquía de castas...",h:80}].map(f=>(
                <div key={f.k} style={card}>
                  <label style={fLb}>{f.l}</label>
                  <textarea value={worldData[f.k]||""} onChange={e=>saveWorld({...worldData,[f.k]:e.target.value})} placeholder={f.ph} style={{...fIn,minHeight:f.h,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  <AiBtn label="Expandir" busy={busy&&aiField===f.k} onClick={()=>aiGen("Expande "+f.l+" para:\n"+idea,"Worldbuilder."+buildCtx(),v=>saveWorld({...worldData,[f.k]:v}),f.k)}/>
                </div>
              ))}
            </div>
            <div style={{...card,marginTop:16}}>
              <label style={fLb}>Atmósfera y Tono</label>
              <textarea value={worldData.tone||""} onChange={e=>saveWorld({...worldData,tone:e.target.value})} placeholder="Oscura y melancólica..." style={{...fIn,minHeight:80,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              <AiBtn label="Definir Tono" busy={busy&&aiField==="tone"} onClick={()=>aiGen("Tono para:\n"+idea,"Crítico literario."+buildCtx(),v=>saveWorld({...worldData,tone:v}),"tone")}/>
            </div>
          </div>
        )}

        {/* VOICE */}
        {view==="voice"&&(
          <div style={{maxWidth:780}}>
            <SecHdr title="Voz y Técnica" sub="POV, tema y premisa de tu obra."/>
            <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div style={card}>
                <label style={{...fLb,marginBottom:12}}>Punto de Vista</label>
                {[{id:"firstPerson",l:"1ª Persona",d:"«Yo caminé». Intimidad."},{id:"thirdClose",l:"3ª Cercana",d:"Acceso a pensamientos."},{id:"thirdOmni",l:"3ª Omnisciente",d:"Narrador lo sabe todo."},{id:"second",l:"2ª Persona",d:"«Caminas». Inmersivo."}].map(opt=>(
                  <div key={opt.id} onClick={()=>saveStr({...structure,pov:opt.id})} style={{padding:"10px 12px",marginBottom:7,background:structure.pov===opt.id?C.aSoft:C.bg,border:`1.5px solid ${structure.pov===opt.id?C.accent:C.border}`,borderRadius:10,cursor:"pointer"}}>
                    <div style={{fontSize:13,fontWeight:600,color:structure.pov===opt.id?C.accent:C.text,marginBottom:1,fontFamily:"Georgia,serif"}}>{opt.l}</div>
                    <div style={{fontSize:11,color:C.light,fontStyle:"italic",fontFamily:"Georgia,serif"}}>{opt.d}</div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={card}>
                  <label style={fLb}>El Tema</label>
                  <textarea value={structure.theme||""} onChange={e=>saveStr({...structure,theme:e.target.value})} placeholder="'La soledad de quien no pertenece'..." style={{...fIn,minHeight:80,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  <AiBtn label="Descubrir Tema" busy={busy&&aiField==="theme"} onClick={()=>aiGen("Tema:\n"+idea,"Crítico literario."+buildCtx(),v=>saveStr({...structure,theme:v}),"theme")}/>
                </div>
                <div style={card}>
                  <label style={fLb}>La Premisa</label>
                  <textarea value={structure.premise||""} onChange={e=>saveStr({...structure,premise:e.target.value})} placeholder="Cuando [incidente], [protagonista] debe..." style={{...fIn,minHeight:70,resize:"vertical",marginBottom:10}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  <AiBtn label="Generar Premisa" busy={busy&&aiField==="premise"} onClick={()=>aiGen("Premisa:\n"+idea,"Experto en pitching."+buildCtx(),v=>saveStr({...structure,premise:v}),"premise")}/>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* CODEX */}
        {view==="codex"&&(
          <div style={{maxWidth:720}}>
            <SecHdr title="El Codex" sub="La IA lo consulta para mantener coherencia." action={<button onClick={()=>setCodexForm({name:"",type:"personaje",desc:""})} style={{...primBtn(false),padding:"9px 18px",fontSize:13}}>+ Añadir</button>}/>
            {["personaje","lugar","objeto","mitología","otro"].map(type=>{
              const entries=codex.filter(e=>e.type===type);if(!entries.length)return null;
              return <div key={type} style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:C.light,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,fontFamily:"Georgia,serif"}}>{type}s</div>
                {entries.map(e=><div key={e.id} style={{...card,marginBottom:8,display:"flex",gap:14,justifyContent:"space-between"}}>
                  <div style={{flex:1}}><div style={{fontSize:14,fontWeight:600,fontFamily:"Georgia,serif",marginBottom:3}}>{e.name}</div><div style={{color:C.mid,fontSize:13,lineHeight:1.5,fontFamily:"Georgia,serif"}}>{e.desc}</div></div>
                  <div style={{display:"flex",gap:5,flexShrink:0}}><button onClick={()=>setCodexForm({...e})} style={{...ghostBtn,padding:"5px 10px",fontSize:12}}>✏</button><button onClick={()=>delCodex(e.id)} style={{...ghostBtn,padding:"5px 10px",fontSize:12,color:C.red}}>✕</button></div>
                </div>)}
              </div>;
            })}
            {codex.length===0&&<div style={{...card,textAlign:"center",padding:48,color:C.light,fontFamily:"Georgia,serif"}}>El Codex está vacío.</div>}
          </div>
        )}

        {/* LOREBOOK */}
        {view==="lorebook"&&(
          <div style={{maxWidth:720}}>
            <SecHdr title="Lorebook" sub="La IA activa entradas cuando detecta palabras clave." action={<button onClick={()=>setLbForm({name:"",kws:"",content:""})} style={{...primBtn(false),padding:"9px 18px",fontSize:13}}>+ Añadir</button>}/>
            {lorebook.map(e=>(
              <div key={e.id} style={{...card,marginBottom:10,display:"flex",gap:14,justifyContent:"space-between"}}>
                <div style={{flex:1}}><div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>{(e.keywords||[]).map(kw=><Tag key={kw}>{kw}</Tag>)}</div><div style={{color:C.mid,fontSize:13,lineHeight:1.5,fontFamily:"Georgia,serif"}}>{e.content}</div></div>
                <div style={{display:"flex",gap:5,flexShrink:0}}><button onClick={()=>setLbForm({...e,kws:(e.keywords||[]).join(", ")})} style={{...ghostBtn,padding:"5px 10px",fontSize:12}}>✏</button><button onClick={()=>delLb(e.id)} style={{...ghostBtn,padding:"5px 10px",fontSize:12,color:C.red}}>✕</button></div>
              </div>
            ))}
            {lorebook.length===0&&<div style={{...card,textAlign:"center",padding:48,color:C.light,fontFamily:"Georgia,serif"}}>El Lorebook está vacío.</div>}
          </div>
        )}

        {/* IMPORTAR */}
        {view==="importar"&&(
          <div style={{maxWidth:720}}>
            <SecHdr title="Importar" sub="La IA analiza y distribuye el contenido."/>
            {impStep===0&&(<div>
              <div style={{...card,marginBottom:16,border:`2px dashed ${C.border}`,borderRadius:18,padding:32,textAlign:"center",background:C.bg}}>
                <div style={{fontSize:32,marginBottom:10}}>📂</div>
                <div style={{fontSize:15,fontFamily:"Georgia,serif",color:C.text,marginBottom:16}}>Sube archivos .txt, .md o .docx</div>
                <label style={{...primBtn(false),display:"inline-flex",cursor:"pointer"}}>Seleccionar<input type="file" multiple accept=".txt,.md,.docx,.rtf" onChange={handleImpFiles} style={{display:"none"}}/></label>
              </div>
              {impFiles.length>0&&(<div style={{...card,marginBottom:16,padding:0,overflow:"hidden"}}>
                {impFiles.map((f,i)=>(<div key={i} style={{padding:"12px 18px",borderBottom:i<impFiles.length-1?"1px solid "+C.borderL:"none",display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:18}}>{f.name.endsWith(".docx")?"📄":"📃"}</span>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:C.text,fontFamily:"Georgia,serif"}}>{f.name}</div>{f.ok?<div style={{fontSize:11,color:C.light,fontFamily:"Georgia,serif"}}>{f.text.length.toLocaleString()} chars</div>:<div style={{fontSize:11,color:C.red}}>Error</div>}</div>
                  <button onClick={()=>setImpFiles(p=>p.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.light,cursor:"pointer",fontSize:15,padding:4}}>✕</button>
                </div>))}
              </div>)}
              <div style={card}>
                <Fld label="O pega texto directamente" value={impText} onChange={setImpText} ph="Notas, fichas, worldbuilding..." ta h={140}/>
                <div style={{display:"flex",justifyContent:"flex-end"}}>
                  <button onClick={processImport} disabled={impBusy||(!impText.trim()&&!impFiles.some(f=>f.ok))} style={primBtn(impBusy||(!impText.trim()&&!impFiles.some(f=>f.ok)))}>✦ Analizar →</button>
                </div>
              </div>
            </div>)}
            {impStep===1&&<div style={{...card,padding:60,textAlign:"center"}}><div style={{fontSize:40,marginBottom:16}}>🔍</div><div style={{fontFamily:"Georgia,serif",fontSize:20,color:C.text}}>Analizando con IA…</div></div>}
            {impStep===3&&<div style={{...card,padding:48,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>⚠️</div><div style={{fontFamily:"Georgia,serif",fontSize:18,color:C.text,marginBottom:16}}>{impError}</div><button onClick={()=>{setImpStep(0);setImpError(null);}} style={primBtn(false)}>← Reintentar</button></div>}
            {impStep===2&&impExtracted&&(<div>
              <div style={{...card,marginBottom:20,padding:"14px 20px",background:C.aSoft,border:`1px solid ${C.accent}33`}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>✦</span><span style={{fontFamily:"Georgia,serif",fontSize:15,color:C.text}}>Análisis listo — selecciona qué importar</span></div>
              </div>
              <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
                {[
                  {k:"idea",label:"💡 Idea",count:impExtracted.idea?.trim()?1:0,preview:impExtracted.idea?.substring(0,80)},
                  {k:"synopsis",label:"📄 Sinopsis",count:impExtracted.synopsis?.trim()?1:0,preview:impExtracted.synopsis?.substring(0,80)},
                  {k:"characters",label:"👤 Personajes",count:impExtracted.characters?.length||0,preview:impExtracted.characters?.map(c=>c.name).filter(Boolean).join(", ")},
                  {k:"worldData",label:"🌍 Worldbuilding",count:Object.values(impExtracted.worldData||{}).filter(v=>v?.trim()).length,preview:impExtracted.worldData?.genre||""},
                  {k:"codex",label:"📚 Codex",count:impExtracted.codex?.length||0,preview:impExtracted.codex?.map(c=>c.name).filter(Boolean).join(", ")},
                  {k:"lorebook",label:"🔑 Lorebook",count:impExtracted.lorebook?.length||0,preview:impExtracted.lorebook?.map(e=>(e.keywords||[])[0]).filter(Boolean).join(", ")},
                  {k:"structure",label:"🏗 Estructura",count:["premise","theme","incitingIncident","midpointTwist","darkNight","climax","plotTwists"].filter(k=>impExtracted.structure?.[k]?.trim()).length,preview:impExtracted.structure?.premise||""},
                  {k:"escaleta",label:"≡ Escaleta",count:impExtracted.escaleta?.length||0,preview:impExtracted.escaleta?.map(e=>e.title).filter(Boolean).join(", ")},
                  {k:"manuscript",label:"✍ Manuscrito",count:impExtracted.manuscript?.trim()?1:0,preview:impExtracted.manuscript?.substring(0,80)},
                ].filter(s=>s.count>0).map(s=>(
                  <div key={s.k} onClick={()=>setImpSel(p=>({...p,[s.k]:!p[s.k]}))} style={{...card,cursor:"pointer",border:`2px solid ${impSel[s.k]?C.accent:C.border}`,background:impSel[s.k]?C.aSoft:C.surface,padding:14}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div style={{fontSize:13,fontWeight:600,color:impSel[s.k]?C.accent:C.text,fontFamily:"Georgia,serif"}}>{s.label} <span style={{fontSize:10,fontWeight:400,color:C.light}}>({s.count})</span></div>
                      <div style={{width:18,height:18,borderRadius:999,border:`2px solid ${impSel[s.k]?C.accent:C.border}`,background:impSel[s.k]?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{impSel[s.k]&&<span style={{color:"#fff",fontSize:10,fontWeight:700}}>✓</span>}</div>
                    </div>
                    {s.preview&&<p style={{fontSize:11,color:C.light,margin:0,lineHeight:1.4,fontFamily:"Georgia,serif"}}>{s.preview}{(s.preview?.length||0)>=80?"…":""}</p>}
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end",flexWrap:"wrap"}}>
                <button onClick={()=>{setImpStep(0);setImpExtracted(null);}} style={ghostBtn}>← Volver</button>
                <button onClick={()=>setImpSel(Object.fromEntries(Object.keys(impSel).map(k=>[k,true])))} style={ghostBtn}>Todo</button>
                <button onClick={applyImport} disabled={!Object.values(impSel).some(Boolean)} style={primBtn(!Object.values(impSel).some(Boolean))}>✓ Importar →</button>
              </div>
            </div>)}
          </div>
        )}

        {/* PUBLICAR */}
        {view==="publicar"&&(
          <div style={{maxWidth:880}}>
            <SecHdr title="Publicar" sub="Adapta tu texto a cualquier plataforma."/>
            <div className="four-col" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:8,marginBottom:28}}>
              {PUB_FORMATS.map(f=>(
                <div key={f.id} onClick={()=>{setPubFormat(f.id);setPubResult("");setPubOpts({tone:"",audience:"",selOpt:f.optList[0],chapterSel:0});}}
                  style={{...card,cursor:"pointer",border:`2px solid ${pubFormat===f.id?f.color:C.border}`,background:pubFormat===f.id?f.color+"08":C.surface,padding:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:5}}>
                    <div style={{width:30,height:30,borderRadius:8,background:f.color+"18",border:`1px solid ${f.color}33`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{f.icon}</div>
                    <div style={{fontSize:12,fontWeight:600,color:pubFormat===f.id?f.color:C.text,lineHeight:1.3,fontFamily:"Georgia,serif"}}>{f.label}</div>
                  </div>
                  <p style={{fontSize:10,color:C.light,margin:0,lineHeight:1.4,fontFamily:"Georgia,serif"}}>{f.desc.substring(0,55)}…</p>
                </div>
              ))}
            </div>
            {pubFormat&&(()=>{
              const fmt=PUB_FORMATS.find(f=>f.id===pubFormat);const srcTxt=getSourceText();
              return(
                <div className="pub-layout" style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:20,alignItems:"start"}}>
                  <div style={{...card,borderTop:`3px solid ${fmt.color}`}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.light,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:10,fontFamily:"Georgia,serif"}}>{fmt.icon} {fmt.label}</div>
                    <label style={fLb}>Fuente</label>
                    <select value={pubSource} onChange={e=>setPubSource(e.target.value)} style={{...fIn,marginBottom:12,fontSize:14}}>
                      <option value="manuscript">Manuscrito</option><option value="prose">Prosa del Engine</option><option value="synopsis">Sinopsis</option>
                      {chapters.length>0&&<option value="chapter">Un capítulo</option>}
                    </select>
                    <label style={fLb}>Opción</label>
                    <select value={pubOpts.selOpt||fmt.optList[0]} onChange={e=>setPubOpts(p=>({...p,selOpt:e.target.value}))} style={{...fIn,marginBottom:12,fontSize:14}}>{fmt.optList.map(o=><option key={o} value={o}>{o}</option>)}</select>
                    <label style={fLb}>Tono</label>
                    <input value={pubOpts.tone||""} onChange={e=>setPubOpts(p=>({...p,tone:e.target.value}))} placeholder="oscuro, esperanzador..." style={{...fIn,marginBottom:14,fontSize:14}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                    <div style={{padding:"8px 12px",background:C.bg,borderRadius:10,marginBottom:12,fontSize:12,color:C.mid,fontFamily:"Georgia,serif"}}>{srcTxt.split(/\s+/).filter(Boolean).length} palabras</div>
                    <button onClick={generatePublication} disabled={pubBusy||!srcTxt.trim()} style={{...primBtn(pubBusy||!srcTxt.trim()),width:"100%",justifyContent:"center",background:pubBusy||!srcTxt.trim()?"#e5e0f5":fmt.color,boxShadow:pubBusy||!srcTxt.trim()?"none":"0 4px 14px "+fmt.color+"55"}}>
                      {pubBusy?"⏳ Adaptando...":"✦ Adaptar"}
                    </button>
                  </div>
                  <div>
                    {pubResult?(
                      <div style={card}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
                          <div style={{fontSize:14,fontWeight:600,color:C.text,fontFamily:"Georgia,serif"}}>{fmt.label} · {pubResult.split(/\s+/).filter(Boolean).length}p</div>
                          <div style={{display:"flex",gap:7}}>
                            <button onClick={copyPub} style={{...ghostBtn,borderColor:pubCopied?C.green:C.border,color:pubCopied?C.green:C.mid,fontSize:12}}>{pubCopied?"✓ Copiado":"⎘ Copiar"}</button>
                            <button onClick={downloadPub} style={{...ghostBtn,fontSize:12}}>⬇ .txt</button>
                          </div>
                        </div>
                        <div style={{background:C.bg,borderRadius:12,padding:"20px 22px",fontSize:15,lineHeight:1.9,color:C.text,fontFamily:"Georgia,serif",whiteSpace:"pre-wrap",border:`1px solid ${C.borderL}`,maxHeight:500,overflowY:"auto"}}>{pubResult}</div>
                      </div>
                    ):(
                      <div style={{...card,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300,textAlign:"center",border:`2px dashed ${C.border}`,background:C.bg}}>
                        <div style={{fontSize:40,marginBottom:12}}>{fmt.icon}</div>
                        <div style={{fontFamily:"Georgia,serif",fontSize:16,color:C.text}}>{fmt.label}</div>
                        <div style={{fontSize:12,color:C.light,maxWidth:260,lineHeight:1.6,fontFamily:"Georgia,serif",marginTop:6}}>{fmt.desc}</div>
                      </div>
                    )}
                  </div>
                </div>
              );
            })()}
            {!pubFormat&&<div style={{...card,padding:40,textAlign:"center",background:C.bg,border:`2px dashed ${C.border}`}}><div style={{fontSize:36,marginBottom:10}}>🖨️</div><div style={{fontFamily:"Georgia,serif",fontSize:16,color:C.text}}>Selecciona un formato arriba</div></div>}
          </div>
        )}
      </div>

      {/* ── SYNC BADGE ── */}
      <SyncBadge status={syncStatus} savedAt={savedAt} isMobile={isMobile}/>

      {/* ── TOAST ── */}
      {toast&&<div style={{position:"fixed",bottom:isMobile?70:24,left:"50%",transform:"translateX(-50%)",background:C.accent,color:"#fff",padding:"12px 20px",borderRadius:999,fontSize:13,fontFamily:"Georgia,serif",fontWeight:600,boxShadow:"0 8px 32px rgba(124,58,237,0.35)",zIndex:2000,whiteSpace:"nowrap"}}>{toast}</div>}

      {/* ── SETTINGS ── */}
      {showSettings&&<SettingsModal user={user} currentKey={apiKey} onSave={handleSaveApiKey} onClose={()=>setShowSettings(false)}/>}

      {/* ── AI MODAL ── */}
      {modal&&(
        <Modal title={modal.type==="describe"?"Opciones Sensoriales":"Reescritura"} sub={modal.type==="rewrite"?"Modo: "+modal.mode:undefined} onClose={()=>setModal(null)} wide>
          {busy&&<div style={{textAlign:"center",padding:40,color:C.mid,fontFamily:"Georgia,serif"}}>⏳ Generando…</div>}
          {modal.type==="describe"&&modal.results&&!busy&&(
            <div>
              <div style={{padding:"10px 14px",background:C.bg,borderRadius:10,marginBottom:16,fontSize:13,color:C.mid,fontStyle:"italic",fontFamily:"Georgia,serif"}}>«{modal.original?.substring(0,60)}{modal.original?.length>60?"…":""}»</div>
              {modal.results.error?<div style={{color:C.red,fontFamily:"Georgia,serif"}}>{modal.results.error}</div>:
                Object.entries(modal.results).map(([sense,text])=>(
                  <div key={sense} style={{marginBottom:10}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:senseC[sense]||C.accent,marginBottom:5,fontFamily:"Georgia,serif"}}>{senseI[sense]} {sense}</div>
                    <div onClick={()=>insertResult(text)} style={{padding:"12px 16px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,cursor:"pointer",fontSize:14,lineHeight:1.7,fontFamily:"Georgia,serif"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.accent} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}>{text}</div>
                  </div>
                ))
              }
            </div>
          )}
          {modal.type==="rewrite"&&modal.results&&!busy&&(
            <div>
              <div style={{padding:"10px 14px",background:C.bg,borderRadius:10,marginBottom:14,fontSize:13,color:C.mid,fontStyle:"italic",fontFamily:"Georgia,serif"}}>«{modal.original?.substring(0,70)}{modal.original?.length>70?"…":""}»</div>
              <div style={{padding:18,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:15,lineHeight:1.9,fontFamily:"Georgia,serif",marginBottom:16}}>{modal.results}</div>
              <button onClick={()=>insertResult(modal.results)} style={{...primBtn(false),width:"100%",justifyContent:"center"}}>✓ Reemplazar texto</button>
            </div>
          )}
        </Modal>
      )}

      {/* ── CHARACTER FORM ── */}
      {charForm&&(
        <Modal title={charForm.id?"Editar Personaje":"Nuevo Personaje"} onClose={()=>setCharForm(null)} wide>
          <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <div><label style={fLb}>Nombre *</label><input value={charForm.name} onChange={e=>setCharForm(f=>({...f,name:e.target.value}))} style={{...fIn,fontSize:15}} placeholder="Lyra..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
            <div><label style={fLb}>Rol</label><select value={charForm.role} onChange={e=>setCharForm(f=>({...f,role:e.target.value}))} style={{...fIn,fontSize:15}}><option value="protagonist">Protagonista</option><option value="antagonist">Antagonista</option><option value="secondary">Secundario</option><option value="mentor">Mentor</option><option value="other">Otro</option></select></div>
            <div style={{gridColumn:"1/-1"}}><Fld label="Apariencia" value={charForm.appearance||""} onChange={v=>setCharForm(f=>({...f,appearance:v}))} ph="28 años. Ojos verdes..." ta h={70}/></div>
            <div><label style={fLb}>😨 Miedo</label><textarea value={charForm.fears||""} onChange={e=>setCharForm(f=>({...f,fears:e.target.value}))} style={{...fIn,minHeight:68,resize:"vertical",marginBottom:8,fontSize:14}} placeholder="Convertirse en..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/><AiBtn label="Sugerir" busy={busy&&aiField==="cfear"} onClick={()=>aiGen("3 miedos para "+(charForm.name||"personaje")+":\n"+idea,"Psicólogo narrativo.",v=>setCharForm(f=>({...f,fears:v})),"cfear")}/></div>
            <div><label style={fLb}>🤫 Secreto</label><textarea value={charForm.secret||""} onChange={e=>setCharForm(f=>({...f,secret:e.target.value}))} style={{...fIn,minHeight:68,resize:"vertical",marginBottom:8,fontSize:14}} placeholder="En el pasado..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/><AiBtn label="Sugerir" busy={busy&&aiField==="csec"} onClick={()=>aiGen("3 secretos para "+(charForm.name||"personaje")+":\n"+idea,"Dramaturgo.",v=>setCharForm(f=>({...f,secret:v})),"csec")}/></div>
            <div style={{gridColumn:"1/-1"}}><label style={fLb}>👻 Fantasma (herida de origen)</label><textarea value={charForm.ghost||""} onChange={e=>setCharForm(f=>({...f,ghost:e.target.value}))} style={{...fIn,minHeight:68,resize:"vertical",marginBottom:8,fontSize:14}} placeholder="De niño..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/><AiBtn label="Sugerir" busy={busy&&aiField==="cghost"} onClick={()=>aiGen("Herida de origen para "+(charForm.name||"personaje")+":\n"+idea,"Psicólogo narrativo.",v=>setCharForm(f=>({...f,ghost:v})),"cghost")}/></div>
            <div style={{gridColumn:"1/-1",background:C.aSoft,border:`1px solid ${C.accent}22`,borderRadius:14,padding:16}}>
              <label style={{...fLb,color:C.accent,marginBottom:10}}>🌱 Arco de Transformación</label>
              <div className="two-col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div><label style={fLb}>Inicio</label><input value={charForm.arcStart||""} onChange={e=>setCharForm(f=>({...f,arcStart:e.target.value}))} style={{...fIn,fontSize:14}} placeholder="Cobarde..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
                <div><label style={fLb}>Final</label><input value={charForm.arcEnd||""} onChange={e=>setCharForm(f=>({...f,arcEnd:e.target.value}))} style={{...fIn,fontSize:14}} placeholder="Valiente..." onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/></div>
              </div>
              <Fld label="¿Cómo se transforma?" value={charForm.arcHow||""} onChange={v=>setCharForm(f=>({...f,arcHow:v}))} ph="El viaje le obliga a..." ta h={64}/>
              <AiBtn label="Generar Arco" busy={busy&&aiField==="carc"} onClick={()=>aiGen("Arco para "+(charForm.name||"personaje")+":\n"+idea,"Experto en arcos.",v=>setCharForm(f=>({...f,arcHow:v})),"carc")}/>
            </div>
            <div style={{gridColumn:"1/-1"}}><button onClick={()=>saveChar(charForm)} disabled={!charForm.name.trim()} style={{...primBtn(!charForm.name.trim()),width:"100%",justifyContent:"center",padding:"13px"}}>Guardar Personaje</button></div>
          </div>
        </Modal>
      )}

      {codexForm&&<Modal title={codexForm.id?"Editar":"Nueva entrada"} onClose={()=>setCodexForm(null)}>
        <Fld label="Nombre" value={codexForm.name} onChange={v=>setCodexForm(f=>({...f,name:v}))} ph="El Arma Prohibida"/>
        <div style={{marginBottom:16}}><label style={fLb}>Tipo</label><select value={codexForm.type} onChange={e=>setCodexForm(f=>({...f,type:e.target.value}))} style={{...fIn,fontSize:15}}>{["personaje","lugar","objeto","mitología","otro"].map(t=><option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}</select></div>
        <Fld label="Descripción" value={codexForm.desc||""} onChange={v=>setCodexForm(f=>({...f,desc:v}))} ta h={110} ph="Descripción detallada..."/>
        <button onClick={()=>saveCodex(codexForm)} disabled={!codexForm.name.trim()} style={{...primBtn(!codexForm.name.trim()),width:"100%",justifyContent:"center",padding:"13px"}}>Guardar</button>
      </Modal>}

      {lbForm&&<Modal title={lbForm.id?"Editar":"Nueva entrada"} onClose={()=>setLbForm(null)}>
        <Fld label="Palabras clave (separadas por coma)" value={lbForm.kws||""} onChange={v=>setLbForm(f=>({...f,kws:v}))} ph="Reino, Aldara, la Reina"/>
        <Fld label="Información contextual" value={lbForm.content||""} onChange={v=>setLbForm(f=>({...f,content:v}))} ta h={130} ph="Todo lo que la IA debe saber..."/>
        <button onClick={()=>saveLb(lbForm)} disabled={!lbForm.kws?.trim()} style={{...primBtn(!lbForm.kws?.trim()),width:"100%",justifyContent:"center",padding:"13px"}}>Guardar</button>
      </Modal>}

      {escaletaForm&&<Modal title={escaletaForm.id?"Editar Escena":"Nueva Escena"} onClose={()=>setEscaletaForm(null)}>
        <Fld label="Título" value={escaletaForm.title} onChange={v=>setEscaletaForm(f=>({...f,title:v}))} ph="La revelación en el castillo..."/>
        <Fld label="¿Qué ocurre?" value={escaletaForm.summary||""} onChange={v=>setEscaletaForm(f=>({...f,summary:v}))} ta h={75} ph="Lyra descubre..."/>
        <Fld label="Objetivo del personaje" value={escaletaForm.goal||""} onChange={v=>setEscaletaForm(f=>({...f,goal:v}))} ph="Conseguir la llave..."/>
        <Fld label="Conflicto" value={escaletaForm.conflict||""} onChange={v=>setEscaletaForm(f=>({...f,conflict:v}))} ph="El guardián sabe su secreto..."/>
        <Fld label="Gancho final" value={escaletaForm.hook||""} onChange={v=>setEscaletaForm(f=>({...f,hook:v}))} ph="Encuentra la carta..."/>
        <button onClick={()=>saveEsc(escaletaForm)} disabled={!escaletaForm.title.trim()} style={{...primBtn(!escaletaForm.title.trim()),width:"100%",justifyContent:"center",padding:"13px"}}>Guardar Escena</button>
      </Modal>}

      {addNodeForm&&<Modal title="Añadir Nodo" onClose={()=>setAddNodeForm(null)}>
        <Fld label="Etiqueta" value={addNodeForm.label} onChange={v=>setAddNodeForm(f=>({...f,label:v}))} ph="El Pacto..."/>
        <button onClick={()=>saveMapNode(addNodeForm)} disabled={!addNodeForm.label.trim()} style={{...primBtn(!addNodeForm.label.trim()),width:"100%",justifyContent:"center"}}>Añadir</button>
      </Modal>}

      {/* ARCO FORM */}
      {arcosForm&&(
        <Modal title={arcosForm.id?"Editar Arco":"Nuevo Arco Argumental"} onClose={()=>setArcosForm(null)} wide>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:4}} className="two-col">
            <div>
              <label style={fLb}>Título del arco</label>
              <input value={arcosForm.title} onChange={e=>setArcosForm(f=>({...f,title:e.target.value}))} placeholder="El viaje de Lyra, La traición del maestro..." style={{...fIn,fontSize:15,marginBottom:14}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              <label style={fLb}>Tipo de arco</label>
              <select value={arcosForm.type} onChange={e=>setArcosForm(f=>({...f,type:e.target.value}))} style={{...fIn,marginBottom:14,fontSize:14}}>
                <option value="principal">Principal — el motor de toda la historia</option>
                <option value="personaje">De personaje — transformación interna</option>
                <option value="secundario">Secundario — trama paralela importante</option>
                <option value="subtrama">Subtrama — hilo secundario</option>
                <option value="romance">Romántico</option>
              </select>
              <label style={fLb}>Personajes involucrados</label>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
                {characters.map(c=>{
                  const sel=(arcosForm.characters||[]).includes(c.name);
                  return <div key={c.id} onClick={()=>setArcosForm(f=>({...f,characters:sel?(f.characters||[]).filter(x=>x!==c.name):[...(f.characters||[]),c.name]}))}
                    style={{padding:"5px 12px",borderRadius:999,border:`1px solid ${sel?C.accent:C.border}`,background:sel?C.aLight:C.surface,color:sel?C.accent:C.mid,cursor:"pointer",fontSize:12,fontFamily:"Georgia,serif",fontWeight:sel?600:400}}>
                    {c.name}
                  </div>;
                })}
                {characters.length===0&&<span style={{fontSize:12,color:C.light,fontFamily:"Georgia,serif"}}>Añade personajes en la sección Personajes</span>}
              </div>
            </div>
            <div>
              <label style={fLb}>Notas generales del arco</label>
              <textarea value={arcosForm.notes||""} onChange={e=>setArcosForm(f=>({...f,notes:e.target.value}))} placeholder="¿Qué pregunta responde este arco? ¿Qué cambia al final?..." style={{...fIn,minHeight:120,resize:"vertical",marginBottom:14}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
              <div style={{padding:"10px 14px",background:C.aSoft,borderRadius:10,fontSize:12,color:C.mid,fontFamily:"Georgia,serif",lineHeight:1.6}}>
                💡 Después de crear el arco, podrás editar cada fase de la línea de tiempo haciendo clic en "Editar".
              </div>
            </div>
          </div>

          {/* Phase editor */}
          <div style={{marginTop:20,marginBottom:20}}>
            <label style={{...fLb,marginBottom:14}}>Fases del arco — rellena las que ya tengas claras</label>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {(arcosForm.phases||EAR.phases).map((ph,i)=>(
                <div key={ph.id} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:ph.desc?C.accent:C.bg,border:`2px solid ${ph.desc?C.accent:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:ph.desc?"#fff":C.light,flexShrink:0,marginTop:2}}>{i+1}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600,color:C.mid,fontFamily:"Georgia,serif",marginBottom:4}}>{ph.label}</div>
                    <textarea value={ph.desc||""} onChange={e=>{
                      const phases=(arcosForm.phases||EAR.phases).map((p,j)=>j===i?{...p,desc:e.target.value}:p);
                      setArcosForm(f=>({...f,phases}));
                    }} placeholder={["¿Qué desencadena este arco?","¿Cómo escala la tensión?","¿Cuál es el punto de no retorno?","¿En qué momento todo parece perdido?","¿Cómo y con qué consecuencias se resuelve?"][i]} style={{...fIn,minHeight:52,resize:"vertical",fontSize:13}} onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                  </div>
                </div>
              ))}
            </div>
          </div>

          <button onClick={()=>arcosForm.title.trim()&&saveArco(arcosForm)} disabled={!arcosForm.title.trim()} style={{...primBtn(!arcosForm.title.trim()),width:"100%",justifyContent:"center",padding:"13px"}}>
            {arcosForm.id?"Guardar cambios":"Crear arco argumental"}
          </button>
        </Modal>
      )}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
