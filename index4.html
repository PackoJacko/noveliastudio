    // GOOGLE DOCS SYNC
    // ═══════════════════════════════════════════════════════════
    const GDOCS_CLIENT_ID = "1095225113205-mp91no1an5vip1fu7526hfrri8pvken3.apps.googleusercontent.com";
    const GDOCS_SCOPES = "https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file";

    let _gTokenClient = null;
    let _gAccessToken = null;
    let _gTokenExpiry = 0;

    function _ensureGDocsToken() {
      return new Promise((resolve, reject) => {
        if (_gAccessToken && Date.now() < _gTokenExpiry - 60000) { resolve(_gAccessToken); return; }
        if (!window.google?.accounts?.oauth2) { reject(new Error("Google Identity Services no cargado aún.")); return; }
        if (!_gTokenClient) {
          _gTokenClient = window.google.accounts.oauth2.initTokenClient({
            client_id: GDOCS_CLIENT_ID,
            scope: GDOCS_SCOPES,
            callback: () => { },
          });
        }
        _gTokenClient.callback = (resp) => {
          if (resp.error) { reject(new Error("Error: " + resp.error)); return; }
          _gAccessToken = resp.access_token;
          _gTokenExpiry = Date.now() + (resp.expires_in || 3600) * 1000;
          resolve(_gAccessToken);
        };
        _gTokenClient.requestAccessToken({ prompt: _gAccessToken ? "" : "consent" });
      });
    }

    async function _gDocsCreate(title) {
      const token = await _ensureGDocsToken();
      const res = await fetch("https://docs.googleapis.com/v1/documents", {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      if (!res.ok) throw new Error("No se pudo crear el documento");
      const doc = await res.json();
      return doc.documentId;
    }

    async function _gDocsWrite(docId, text) {
      const token = await _ensureGDocsToken();
      const getRes = await fetch(`https://docs.googleapis.com/v1/documents/${docId}`, {
        headers: { "Authorization": "Bearer " + token },
      });
      if (!getRes.ok) throw new Error("No se pudo leer el documento");
      const doc = await getRes.json();
      const content = doc.body?.content || [];
      const lastEl = content[content.length - 1];
      const endIndex = lastEl ? (lastEl.endIndex - 1) : 1;
      const requests = [];
      if (endIndex > 1) requests.push({ deleteContentRange: { range: { startIndex: 1, endIndex } } });
      if (text) requests.push({ insertText: { location: { index: 1 }, text } });
      if (!requests.length) return;
      await fetch(`https://docs.googleapis.com/v1/documents/${docId}:batchUpdate`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
        body: JSON.stringify({ requests }),
      });
    }

    async function _gDocsRead(docId) {
      const token = await _ensureGDocsToken();
      const res = await fetch(`https://docs.googleapis.com/v1/documents/${docId}`, {
        headers: { "Authorization": "Bearer " + token },
      });
      if (!res.ok) throw new Error("No se pudo leer el documento");
      const doc = await res.json();
      let text = "";
      for (const el of (doc.body?.content || [])) {
        if (el.paragraph) {
          for (const pe of (el.paragraph.elements || [])) {
            if (pe.textRun?.content) text += pe.textRun.content;
          }
        }
      }
      return text.trimEnd();
    }

    async function callAI(messages, system = "", max = 1000, apiKey) {
      if (!apiKey) throw new Error("Sin API key.");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: max,
          ...(system ? { system } : {}),
          messages
        }),
      });
      const d = await res.json();
      if (d.error) throw new Error(d.error.message);
      return d.content?.map(b => b.text || "").join("\n") || "";
    }

    // ═══════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════
    function App() {
      const isMobile = useMobile();

      const [user, setUser] = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [apiKey, setApiKey] = useState(null);
      const [showSettings, setShowSettings] = useState(false);
      const [screen, setScreen] = useState("loading");
      const [library, setLibrary] = useState([]);
      const [activeBook, setActiveBook] = useState(null);
      const [showLibrary, setShowLibrary] = useState(false);
      const [newBookType, setNewBookType] = useState(null);
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [savedAt, setSavedAt] = useState(null);
      const [syncStatus, setSyncStatus] = useState("synced");
      const [view, setView] = useState("engine");
      const [busy, setBusy] = useState(false);
      const [aiField, setAiField] = useState(null);
      const [toast, setToast] = useState(null);
      const [modal, setModal] = useState(null);

      // Story Engine
      const [idea, setIdea] = useState("");
      const [synopsis, setSynopsis] = useState("");
      const [outline, setOutline] = useState("");
      const [beats, setBeats] = useState("");
      const [prose, setProse] = useState("");
      const [step, setStep] = useState(0);

      // Manuscript
      const [manuscript, setManuscript] = useState("");
      const [selText, setSelText] = useState("");
      const [selRange, setSelRange] = useState([0, 0]);
      const [showTools, setShowTools] = useState(false);
      const taRef = useRef(null);

      // Characters
      const [characters, setCharacters] = useState([]);
      const [charForm, setCharForm] = useState(null);

      // World
      const [worldData, setWorldData] = useState(EW);

      // Structure
      const [structure, setStructure] = useState(ES);

      // Escaleta
      const [escaleta, setEscaleta] = useState([]);
      const [escaletaForm, setEscaletaForm] = useState(null);

      // Chapters
      const [chapters, setChapters] = useState([]);

      // Codex & Lorebook
      const [codex, setCodex] = useState([]);
      const [codexForm, setCodexForm] = useState(null);
      const [lorebook, setLorebook] = useState([]);
      const [lbForm, setLbForm] = useState(null);

      // Brainstorm
      const [bsCat, setBsCat] = useState("nombres");
      const [bsCtx, setBsCtx] = useState("");
      const [bsResults, setBsResults] = useState([]);
      const [bsFavs, setBsFavs] = useState([]);

      // Mapa
      const [mapNodes, setMapNodes] = useState([]);
      const [mapLinks, setMapLinks] = useState([]);
      const [mapFilter, setMapFilter] = useState("all");
      const [addNodeForm, setAddNodeForm] = useState(null);
      const [addLinkForm, setAddLinkForm] = useState(null);
      const svgRef = useRef(null);

      // Arcos
      const [arcos, setArcos] = useState([]);
      const [arcosForm, setArcosForm] = useState(null);

      // Publish
      const [pubFormat, setPubFormat] = useState(null);
      const [pubSource, setPubSource] = useState("manuscript");
      const [pubResult, setPubResult] = useState("");
      const [pubBusy, setPubBusy] = useState(false);
      const [pubOpts, setPubOpts] = useState({ tone: "", selOpt: "" });

      // Google Docs
      const [linkedDocId, setLinkedDocId] = useState(null);
      const [docSyncStatus, setDocSyncStatus] = useState("idle");

      const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 4500); };

      const saveField = useCallback(async (key, value) => {
        if (!activeBook?.id || !user?.uid) return;
        setSyncStatus("syncing");
        const success = await saveBookData(user.uid, activeBook.id, key, value);
        if (success) { setSavedAt(new Date().toISOString()); setSyncStatus("synced"); }
        else setSyncStatus("offline");
      }, [activeBook?.id, user?.uid]);

      const loadBook = useCallback(async (book) => {
        if (!user?.uid) return;
        setActiveBook(book);
        setIdea(await loadBookData(user.uid, book.id, "idea", ""));
        setSynopsis(await loadBookData(user.uid, book.id, "synopsis", ""));
        setOutline(await loadBookData(user.uid, book.id, "outline", ""));
        setBeats(await loadBookData(user.uid, book.id, "beats", ""));
        setProse(await loadBookData(user.uid, book.id, "prose", ""));
        setStep(await loadBookData(user.uid, book.id, "step", 0));
        setManuscript(await loadBookData(user.uid, book.id, "manuscript", ""));
        setCharacters(await loadBookData(user.uid, book.id, "characters", []));
        setWorldData(await loadBookData(user.uid, book.id, "world", EW));
        setStructure(await loadBookData(user.uid, book.id, "structure", ES));
        setEscaleta(await loadBookData(user.uid, book.id, "escaleta", []));
        setChapters(await loadBookData(user.uid, book.id, "chapters", []));
        setCodex(await loadBookData(user.uid, book.id, "codex", []));
        setLorebook(await loadBookData(user.uid, book.id, "lorebook", []));
        setBsFavs(await loadBookData(user.uid, book.id, "bsfavs", []));
        setMapNodes(await loadBookData(user.uid, book.id, "mapnodes", []));
        setMapLinks(await loadBookData(user.uid, book.id, "maplinks", []));
        setArcos(await loadBookData(user.uid, book.id, "arcos", []));
        setLinkedDocId(await loadBookData(user.uid, book.id, "linkedDocId", null));
        setView("engine");
        setSidebarOpen(false);
      }, [user?.uid]);

      const openBook = async (book) => { await loadBook(book); setScreen("app"); setShowLibrary(false); };
      const createBook = async (data) => {
        if (!user?.uid) return;
        const book = { id: newBookId(), title: data.title, color: data.color, createdAt: new Date().toISOString(), lastEdited: new Date().toISOString(), wordCount: 0 };
        const newLib = [book, ...library];
        setLibrary(newLib);
        await saveLibrary(user.uid, newLib);
        setNewBookType(null);
        openBook(book);
      };
      const deleteBook = async (bookId) => {
        if (!user?.uid) return;
        const newLib = library.filter(b => b.id !== bookId);
        setLibrary(newLib);
        await saveLibrary(user.uid, newLib);
        if (activeBook?.id === bookId) { setActiveBook(null); setScreen("home"); }
      };
      const handleSaveApiKey = async (key) => {
        if (user?.uid) await saveApiKey(user.uid, key);
        setApiKey(key);
        setShowSettings(false);
        if (screen === "setup") setScreen("home");
      };

      // CONTEXTO COMPLETO PARA IA
      const buildFullContext = useCallback(() => {
        let ctx = "### CONTEXTO DE LA HISTORIA ###\n";
        if (characters.length) {
          ctx += "\n## PERSONAJES EXISTENTES (NO INVENTES NUEVOS) ##\n";
          characters.forEach(c => ctx += `- ${c.name}: ${c.role} - ${c.appearance || ""}\n`);
        }
        if (codex.length) {
          ctx += "\n## CODEX ##\n";
          codex.forEach(e => ctx += `- ${e.name}: ${e.desc}\n`);
        }
        if (structure.theme) ctx += `\n## TEMA ##\n${structure.theme}\n`;
        if (worldData.tone) ctx += `\n## TONO ##\n${worldData.tone}\n`;
        ctx += "\n## IMPORTANTE ##\nNO inventes personajes nuevos. Usa SOLO los listados arriba.\n";
        return ctx;
      }, [characters, codex, structure, worldData]);

      const aiGenWithContext = async (prompt, sys, setter, key, max = 800) => {
        if (!apiKey) { showToast("⚠ Configura API Key"); return; }
        setBusy(true); setAiField(key);
        try {
          const r = await callAI([{ role: "user", content: prompt }], buildFullContext() + "\n" + (sys || ""), max, apiKey);
          setter(r.trim());
        } catch (e) { showToast("⚠ " + e.message); }
        setBusy(false); setAiField(null);
      };

      const genEngine = async () => {
        if (!apiKey) { showToast("⚠ Configura API Key"); return; }
        setBusy(true);
        try {
          if (step === 0) {
            const r = await callAI([{ role: "user", content: "Crea sinopsis de 4 párrafos: " + idea }], buildFullContext(), 800, apiKey);
            setSynopsis(r); await saveField("synopsis", r); setStep(1); await saveField("step", 1);
          } else if (step === 1) {
            const r = await callAI([{ role: "user", content: "Esquema 12 capítulos: " + synopsis }], buildFullContext(), 1000, apiKey);
            setOutline(r); await saveField("outline", r); setStep(2); await saveField("step", 2);
          } else if (step === 2) {
            const r = await callAI([{ role: "user", content: "Story beats primeros 3 capítulos: " + outline }], buildFullContext(), 1000, apiKey);
            setBeats(r); await saveField("beats", r); setStep(3); await saveField("step", 3);
          } else if (step === 3) {
            const r = await callAI([{ role: "user", content: "Primer capítulo completo: " + beats }], buildFullContext(), 1200, apiKey);
            setProse(r); await saveField("prose", r); setStep(4); await saveField("step", 4);
          }
        } catch (e) { showToast("⚠ " + e.message); }
        setBusy(false);
      };

      const handleSel = () => {
        const ta = taRef.current;
        if (!ta) return;
        const s = ta.value.substring(ta.selectionStart, ta.selectionEnd).trim();
        if (s.length > 3) { setSelText(s); setSelRange([ta.selectionStart, ta.selectionEnd]); setShowTools(true); }
        else setShowTools(false);
      };

      const insertResult = text => {
        const n = manuscript.substring(0, selRange[0]) + text + manuscript.substring(selRange[1]);
        setManuscript(n); saveField("manuscript", n); setModal(null); setShowTools(false);
      };

      const openDescribe = async () => {
        if (!apiKey) { showToast("⚠ Configura API Key"); return; }
        setBusy(true); setModal({ type: "describe", results: null, original: selText });
        try {
          const raw = await callAI([{ role: "user", content: `JSON con descripciones sensoriales para: "${selText}"` }], buildFullContext() + "\nResponde SOLO JSON: {\"vista\":\"\",\"olfato\":\"\",\"tacto\":\"\",\"oído\":\"\",\"gusto\":\"\",\"metáfora\":\"\"}", 700, apiKey);
          const match = raw.match(/\{[\s\S]*\}/);
          const parsed = match ? JSON.parse(match[0]) : { error: "Error" };
          setModal({ type: "describe", results: parsed, original: selText });
        } catch (e) { setModal({ type: "describe", results: { error: e.message }, original: selText }); }
        setBusy(false);
      };

      const openRewrite = async (mode) => {
        if (!apiKey) { showToast("⚠ Configura API Key"); return; }
        setBusy(true); setModal({ type: "rewrite", mode, results: null, original: selText });
        const prompts = { descriptivo: "Reescribe más descriptivo", intenso: "Más intenso", corto: "Más conciso", pov: "Cambia POV", cliffhanger: "Termina en cliffhanger", giro: "Añade giro", tension: "Aumenta tensión", dialogo: "Convierte en diálogo", flashback: "Haz flashback", foreshadow: "Añade presagio", metafora: "Añade metáforas", ritmo: "Altera ritmo" };
        try {
          const r = await callAI([{ role: "user", content: `${prompts[mode]}: "${selText}"\n\nImportante: Mantén los personajes existentes.` }], buildFullContext(), 800, apiKey);
          setModal({ type: "rewrite", mode, results: r, original: selText });
        } catch (e) { showToast("⚠ " + e.message); setModal(null); }
        setBusy(false);
      };

      const runBrainstorm = async () => {
        if (!apiKey) { showToast("⚠ Configura API Key"); return; }
        setBusy(true);
        try {
          const r = await callAI([{ role: "user", content: `Genera 10 ideas sobre "${bsCat}"${bsCtx ? ` contexto: ${bsCtx}` : ""}. Una por línea.` }], buildFullContext(), 600, apiKey);
          setBsResults(r.split("\n").map(l => l.replace(/^[\-•\d.]\s*/, "").trim()).filter(Boolean).slice(0, 10));
        } catch (e) { showToast("⚠ " + e.message); }
        setBusy(false);
      };

      // CRUD con guardado
      const saveCharacters = async (newChars) => { setCharacters(newChars); await saveField("characters", newChars); };
      const saveChar = async (ch) => {
        const n = ch.id ? characters.map(x => x.id === ch.id ? ch : x) : [...characters, { ...ch, id: Date.now().toString() }];
        await saveCharacters(n); setCharForm(null);
      };
      const delChar = async (id) => { await saveCharacters(characters.filter(c => c.id !== id)); };

      const saveWorld = async (w) => { setWorldData(w); await saveField("world", w); };
      const saveStructure = async (s) => { setStructure(s); await saveField("structure", s); };

      const saveEscaleta = async (newEsc) => { setEscaleta(newEsc); await saveField("escaleta", newEsc); };
      const saveEsc = async (e) => {
        const n = e.id ? escaleta.map(x => x.id === e.id ? e : x) : [...escaleta, { ...e, id: Date.now().toString() }];
        await saveEscaleta(n); setEscaletaForm(null);
      };
      const delEsc = async (id) => { await saveEscaleta(escaleta.filter(e => e.id !== id)); };

      const saveCodexList = async (newCodex) => { setCodex(newCodex); await saveField("codex", newCodex); };
      const saveCodex = async (e) => {
        const n = e.id ? codex.map(x => x.id === e.id ? e : x) : [...codex, { ...e, id: Date.now().toString() }];
        await saveCodexList(n); setCodexForm(null);
      };
      const delCodex = async (id) => { await saveCodexList(codex.filter(e => e.id !== id)); };

      const saveLorebook = async (newLb) => { setLorebook(newLb); await saveField("lorebook", newLb); };
      const saveLb = async (entry) => {
        const e = { ...entry, keywords: entry.kws ? entry.kws.split(",").map(k => k.trim()) : [] };
        delete e.kws;
        const n = e.id ? lorebook.map(l => l.id === e.id ? e : l) : [...lorebook, { ...e, id: Date.now().toString() }];
        await saveLorebook(n); setLbForm(null);
      };
      const delLb = async (id) => { await saveLorebook(lorebook.filter(e => e.id !== id)); };

      const saveChapters = async (newCh) => { setChapters(newCh); await saveField("chapters", newCh); };
      const addCh = async () => { await saveChapters([...chapters, { id: Date.now().toString(), title: "Capítulo " + (chapters.length + 1), notes: "", status: "draft" }]); };
      const updCh = async (id, ch) => { await saveChapters(chapters.map(c => c.id === id ? { ...c, ...ch } : c)); };
      const delCh = async (id) => { await saveChapters(chapters.filter(c => c.id !== id)); };

      const saveArcos = async (newArcos) => { setArcos(newArcos); await saveField("arcos", newArcos); };
      const saveArco = async (arco) => {
        const n = arco.id ? arcos.map(a => a.id === arco.id ? arco : a) : [...arcos, { ...arco, id: Date.now().toString() }];
        await saveArcos(n); setArcosForm(null);
      };
      const delArco = async (id) => { await saveArcos(arcos.filter(a => a.id !== id)); };

      const saveMapNodesList = async (newNodes) => { setMapNodes(newNodes); await saveField("mapnodes", newNodes); };
      const saveMapLinksList = async (newLinks) => { setMapLinks(newLinks); await saveField("maplinks", newLinks); };
      const saveMapNode = async (form) => {
        await saveMapNodesList([...mapNodes, { id: "cn-" + Date.now(), label: form.label, type: "custom" }]);

      const saveMapLink = async (form) => {
        await saveMapLinksList([...mapLinks, { id: "ml-" + Date.now(), source: form.source, target: form.target, label: form.label || "" }]);
        setAddLinkForm(null);
      };
      const delMapLink = async (id) => { await saveMapLinksList(mapLinks.filter(l => l.id !== id)); };
      const delMapNode = async (id) => {
        await saveMapNodesList(mapNodes.filter(n => n.id !== id));
        await saveMapLinksList(mapLinks.filter(l => l.source !== id && l.target !== id));
      };

      const buildAllMapNodes = useCallback(() => {
        const nodes = [];
        characters.forEach(c => nodes.push({ id: "c-" + c.id, label: c.name, type: c.role, group: "cast" }));
        codex.forEach(e => nodes.push({ id: "cx-" + e.id, label: e.name, type: e.type || "otro", group: "world" }));
        escaleta.forEach(e => nodes.push({ id: "es-" + e.id, label: e.title, type: "escena", group: "plot" }));
        arcos.forEach(a => nodes.push({ id: "ar-" + a.id, label: a.title, type: "structure", group: "plot" }));
        mapNodes.forEach(n => nodes.push({ ...n, group: "custom" }));
        return nodes;
      }, [characters, codex, escaleta, arcos, mapNodes]);

      useEffect(() => {
        if (view !== "mapa" || !svgRef.current || !buildAllMapNodes().length) return;
        const allNodes = buildAllMapNodes();
        const filtered = mapFilter === "all" ? allNodes : allNodes.filter(n => ({ cast: "cast", world: "world", plot: "plot" }[mapFilter] === n.group));
        const nodeIds = new Set(filtered.map(n => n.id));
        const links = mapLinks.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));
        const nodes = filtered.map(n => ({ ...n }));
        const el = svgRef.current;
        const { width: W, height: H } = el.getBoundingClientRect();
        const svg = d3.select(el);
        svg.selectAll("*").remove();
        const defs = svg.append("defs");
        defs.append("marker").attr("id", "arr").attr("viewBox", "0 -4 8 8").attr("refX", 32).attr("refY", 0).attr("markerWidth", 5).attr("markerHeight", 5).attr("orient", "auto").append("path").attr("d", "M0,-4L8,0L0,4").attr("fill", "#c4b5fd");
        const g = svg.append("g");
        const zoom = d3.zoom().scaleExtent([.2, 4]).on("zoom", e => g.attr("transform", e.transform));
        svg.call(zoom);
        const sim = d3.forceSimulation(nodes)
          .force("link", d3.forceLink(links).id(d => d.id).distance(150))
          .force("charge", d3.forceManyBody().strength(-400))
          .force("center", d3.forceCenter(W / 2, H / 2))
          .force("collide", d3.forceCollide(60));
        const link = g.append("g").selectAll("line").data(links).join("line").attr("stroke", "#c4b5fd").attr("stroke-width", 2).attr("marker-end", "url(#arr)");
        const ltext = g.append("g").selectAll("text").data(links.filter(l => l.label)).join("text").text(d => d.label).attr("font-size", 9).attr("fill", C.light).attr("text-anchor", "middle");
        const drag = d3.drag().on("start", (e, d) => { if (!e.active) sim.alphaTarget(.3).restart(); d.fx = d.x; d.fy = d.y; }).on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; }).on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); });
        const node = g.append("g").selectAll("g").data(nodes).join("g").call(drag).style("cursor", "grab");
        node.append("circle").attr("r", 24).attr("fill", d => (NODE_C[d.type] || "#6b7280") + "20").attr("stroke", d => NODE_C[d.type] || "#6b7280").attr("stroke-width", 2);
        node.append("circle").attr("r", 12).attr("fill", d => (NODE_C[d.type] || "#6b7280") + "50");
        node.append("text").text(d => d.label?.length > 12 ? d.label.slice(0, 11) + "…" : d.label).attr("text-anchor", "middle").attr("dy", "2.5em").attr("font-size", 10);
        node.append("title").text(d => d.label);
        sim.on("tick", () => {
          link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
          ltext.attr("x", d => (d.source.x + d.target.x) / 2).attr("y", d => (d.source.y + d.target.y) / 2 - 8);
          node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
        });
        setTimeout(() => svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(W / 2, H / 2).scale(.8)), 100);
        return () => sim.stop();
      }, [view, buildAllMapNodes, mapLinks, mapFilter]);

      const getSourceText = () => {
        if (pubSource === "manuscript") return manuscript;
        if (pubSource === "synopsis") return synopsis;
        return manuscript;
      };
      const generatePublication = async () => {
        const fmt = PUB_FORMATS.find(f => f.id === pubFormat);
        if (!fmt) return;
        const src = getSourceText();
        if (!src.trim()) { showToast("⚠ Sin contenido."); return; }
        setPubBusy(true);
        try {
          const r = await callAI([{ role: "user", content: `Adapta al formato "${fmt.label}". Opción: ${pubOpts.selOpt || fmt.optList[0]}. Texto:\n${src.substring(0, 6000)}` }], buildFullContext(), 1500, apiKey);
          setPubResult(r);
        } catch (e) { showToast("⚠ " + e.message); }
        setPubBusy(false);
      };
      const copyPub = async () => { try { await navigator.clipboard.writeText(pubResult); showToast("✓ Copiado"); } catch { } };
      const downloadPub = () => {
        const fmt = PUB_FORMATS.find(f => f.id === pubFormat);
        const blob = new Blob([pubResult], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (activeBook?.title || "novela") + "-" + (fmt?.id || "export") + ".txt";
        a.click();
        URL.revokeObjectURL(url);
      };
      const exportProject = () => {
        const blob = new Blob([JSON.stringify({ characters, codex, lorebook, arcos, mapNodes, mapLinks, worldData, structure, escaleta, chapters }, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "novelai-backup-" + new Date().toISOString().slice(0, 10) + ".json";
        a.click();
        URL.revokeObjectURL(url);
      };
      const importProject = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async ev => {
          try {
            const data = JSON.parse(ev.target.result);
            if (data.characters) await saveCharacters(data.characters);
            if (data.codex) await saveCodexList(data.codex);
            if (data.lorebook) await saveLorebook(data.lorebook);
            if (data.arcos) await saveArcos(data.arcos);
            if (data.mapNodes) await saveMapNodesList(data.mapNodes);
            if (data.mapLinks) await saveMapLinksList(data.mapLinks);
            if (data.worldData) await saveWorld(data.worldData);
            if (data.structure) await saveStructure(data.structure);
            if (data.escaleta) await saveEscaleta(data.escaleta);
            if (data.chapters) await saveChapters(data.chapters);
            showToast("✓ Importado");
          } catch { showToast("⚠ Error"); }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      const handleLinkGoogleDoc = async () => {
        if (!user?.uid || !activeBook) return;
        setDocSyncStatus("syncing");
        try {
          const docId = await _gDocsCreate(activeBook.title + " — NovelAI");
          if (manuscript.trim()) await _gDocsWrite(docId, manuscript);
          setLinkedDocId(docId);
          await saveField("linkedDocId", docId);
          setDocSyncStatus("synced");
          showToast("✓ Google Doc vinculado");
          window.open(`https://docs.google.com/document/d/${docId}/edit`, "_blank");
        } catch (e) { setDocSyncStatus("error"); showToast("⚠ " + e.message); }
      };
      const handlePushToDoc = async () => {
        if (!linkedDocId) return;

        try { await _gDocsWrite(linkedDocId, manuscript); setDocSyncStatus("synced"); showToast("✓ Enviado"); }
        catch (e) { setDocSyncStatus("error"); showToast("⚠ " + e.message); }
      };
      const handlePullFromDoc = async () => {

        setDocSyncStatus("syncing");
        try { const text = await _gDocsRead(linkedDocId); setManuscript(text); await saveField("manuscript", text); setDocSyncStatus("synced"); showToast("✓ Importado"); }
        catch (e) { setDocSyncStatus("error"); showToast("⚠ " + e.message); }
      };
      const handleUnlinkDoc = async () => {
        if (!confirm("¿Desvincular?")) return;

        await saveField("linkedDocId", null);

      useEffect(() => {

        return unsub;

      useEffect(() => {

      if (!authReady) return <div style={{ width: "100vw", height: "100vh", background: "#0c0a14" }} />;

        <>

            </div>

                <div style={{ width: 9, height: 9, borderRadius: 2, background: activeBook?.color || C.accent }} />

                      <button onClick={() => window.open(`https://docs.google.com/document/d/${linkedDocId}/edit`, "_blank")} style={{ flex: 1, padding: "5px", borderRadius: 8, background: "rgba(15,157,88,0.08)", color: "#0a7a45", fontSize: 10 }}>↗ Abrir</button>
                    </div>
                    <button onClick={handleUnlinkDoc} style={{ width: "100%", marginTop: 6, padding: "4px", background: "none", border: "none", color: C.light, fontSize: 10 }}>Desvincular</button>

              <button onClick={() => { setShowSettings(true); setSidebarOpen(false); }} style={{ width: "100%", padding: "7px", borderRadius: 10, border: `1px solid ${C.border}`, background: "transparent", color: C.light, fontSize: 11 }}>⚙ Ajustes</button>
            </div>

          <div className="app-main" style={{ flex: 1, overflowY: "auto", padding: isMobile ? "60px 16px 80px" : "36px 48px" }}>

            {view === "engine" && (

                  {["Idea", "Sinopsis", "Esquema", "Beats", "Prosa"].map((s, i) => (

                        <span>{r}</span>

            {/* PERSONAJES */}

              </div>

              <div style={{ marginBottom: 16 }}><label style={fLb}>Estado</label><select value={arcosForm.status} onChange={e => setArcosForm(f => ({ ...f, status: e.target.value }))} style={fIn}><option value="planned">Planificado</option><option value="writing">Escribiendo</option><option value="completed">Completado</option></select></div>

            </Modal>
          )}

          {toast && <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: C.accent, color: "#fff", padding: "12px 20px", borderRadius: 999, zIndex: 2000 }}>{toast}</div>}
          {showSettings && <SettingsModal user={user} currentKey={apiKey} onSave={handleSaveApiKey} onClose={() => setShowSettings(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>

</html>
